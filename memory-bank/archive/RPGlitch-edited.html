---
permalink: archives/rpglitch-edited
---

<head>
  <!-- Hidden for accessibility/SEO -->
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2.1.1/css/pico.min.css">
  <h1 id="hidden-h1" class="hidden">RPGlitch</h1>
  <a href="#main" class="hidden">Skip to main content</a>

  <!-- Initial Loading -->
  <dialog id="initial-loading" class="initial-loading" no-header>
    <div>Loading...</div>
  </dialog>

  <!-- Error Emergency -->
  <dialog id="emergency-container" class="emergency-container" no-header>
    <div class="emergency-container">
      <div class="emergency-container">Error during load?</div>
      <button id="emergency-export" onclick="App.exportAllData()" class="danger">Save All Data &#128190;</button>
      <button id="emergency-delete" onclick="App.deleteAllData()" class="danger">Delete All Data &#128680;</button>
    </div>
  </dialog>
</head>

<body>

  <header class="container-fluid">
    
      <!-- Top Bar -->
      <nav id="top-bar" class="top-bar">

        <!-- Top Bar Left -->
        <div id="top-bar-left" class="top-bar-left">
          <ul class="top-bar-left">
            <li><button class="secondary" data-chin="stories" role="tab" aria-selected="false" tabindex="1" _="on click call App.selectTopBarTab('stories') then call App.updateTopBarUI()">Stories</button></li>
            <li><button class="secondary" data-chin="characters" role="tab" aria-selected="false" tabindex="2" _="on click call App.selectTopBarTab('characters') then call App.updateTopBarUI()">Characters</button></li>
            <li><button class="secondary" data-chin="worlds" role="tab" aria-selected="false" tabindex="3" _="on click call App.selectTopBarTab('worlds') then call App.updateTopBarUI()">Worlds</button></li>
            <li><button class="secondary" data-chin="options" role="tab" aria-selected="false" tabindex="4" _="on click call App.selectTopBarTab('options') then call App.updateTopBarUI()">Options</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Storyboard -->
        <div id="top-bar-right-storyboard" class="top-bar-right">
          <ul class="top-bar-right">
            <li><button class="secondary" id="shuffle" _="on click call App._shuffleStoryboard()">Shuffle</button></li>
            <li><button class="primary" id="begin-story" _="on click call App.beginStory()">Begin Story</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Form -->
        <div id="top-bar-right-form" class="top-bar-right">
          <ul class="top-bar-right">
            <li><button class="secondary" id="form-cancel">Cancel</button></li>
            <li><button class="primary" id="form-save">Save</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Profile -->
        <div id="top-bar-right-profile" class="top-bar-right">
          <ul class="top-bar-right">
            <li><button class="secondary" id="profile-edit">Edit</button></li>
            <li><button class="secondary" id="profile-copy">Copy & Customize</button></li>
            <li><button class="danger" id="profile-delete">Delete</button></li>
            <li><button class="primary" id="profile-back">Back</button></li>
          </ul>
        </div>

      </nav>

      <!-- Chin: Story -->
      <div id="chin-stories" class="hidden" data-chin="stories">
        <div class="chin-actions">
          <div class="chin-actions-left">
            <form role="search">
              <fieldset role="group">
                <input type="search" id="search-stories-input" name="search" placeholder="Search Stories" aria-label="Search Stories">
                <button type="submit" class="secondary">Search</button>
              </fieldset>
            </form>
          </div>
          <div class="chin-actions-right">
            <button type="button" class="secondary" onclick="document.getElementById('upload-story').click();">
              Upload Story
            </button>
            <input type="file" id="upload-story" aria-label="Upload Story" class="file-input-hidden">
            <button id="new-story" class="secondary">New Story</button>
          </div>
        </div>
        <div id="chin-story-list" class="chin-list"><!-- Story Cards --></div>
      </div>

      <!-- Chin: Character -->
      <div id="chin-characters" class="hidden" data-chin="characters">
        <div class="chin-actions">
          <div class="chin-actions-left">
            <form role="search">
              <fieldset role="group">
                <input type="search" id="search-characters-input" name="search" placeholder="Search Characters" aria-label="Search Characters">
                <button type="submit" class="secondary">Search</button>
              </fieldset>
            </form>
          </div>
          <div class="chin-actions-right">
            <button type="button" class="secondary" onclick="document.getElementById('upload-character').click();">
              Upload Character
            </button>
            <input type="file" id="upload-character" aria-label="Upload Character" class="file-input-hidden">
            <button id="new-character" class="secondary">New Character</button>
          </div>
        </div>
        <div id="chin-character-list" class="chin-list">
          <article class="chin-card">
            <div class="chin-card">
              <div class="chin-card-left">
                <header>
                  <h4>Starship AI "ADA"</h4>
                </header>
                <p>
                  The ever-helpful AI of the starship "Odyssey," tasked with crew support and mission analysis.
                </p>
                <footer>
                  <small>Premade</small> 
                </footer>
              </div>
              <div class="chin-card-right">
                <div class="chin-card-picture">
                  SA
                </div>
              </div>
            </div>
          </article>
        </div>
      </div>

      <!-- Chin: World -->
      <div id="chin-worlds" class="hidden" data-chin="worlds">
        <div class="chin-actions">
          <div class="chin-actions-left">
            <form role="search">
              <fieldset role="group">
                <input type="search" id="search-worlds-input" name="search" placeholder="Search Worlds" aria-label="Search Worlds">
                <button type="submit" class="secondary">Search</button>
              </fieldset>
            </form>
          </div>
          <div class="chin-actions-right">
            <button type="button" class="secondary" onclick="document.getElementById('upload-world').click();">
              Upload World
            </button>
            <input type="file" id="upload-world" aria-label="Upload World" class="file-input-hidden">
            <button id="new-world" class="secondary">New World</button>
          </div>
        </div>
        <div id="chin-world-list" class="chin-list-grid"><!-- World Cards --></div>
      </div>

      <!-- Chin: Options -->
      <div id="chin-options" class="hidden" data-chin="options">
        <div class="chin-actions">
          <div class="chin-actions-left">
          <!-- Something in the future? -->
          </div>
          <div class="chin-actions-right">
            <button type="button" class="secondary" onclick="document.getElementById('upload-backup').click();">
              Upload Backup
            </button>
            <input type="file" id="upload-backup" aria-label="Upload Backup" class="file-input-hidden">
            <button id="download-backup" class="secondary">Download Backup</button>
            <button id="start-fresh" class="danger">Start Fresh</button>
          </div>
        </div>
        <div id="chin-options-grid">
          <textarea id="opening-prompt-textarea" placeholder="Opening Prompt"></textarea>
          <textarea id="custom-story-js-textarea" placeholder="Custom JS"></textarea>
        </div>
      </div>
    </div>

  </header>
