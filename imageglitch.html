<body>
<div class="container">
  <fieldset>  
  <div class="controls">
  <div class="settings-row">
    <div class="generate-button-container"><button id="generateBtn">Generate</button></div>
    <div class="generate-button-container"><button id="refineBtn">Refine Prompt</button></div>
    <div class="generate-button-container"><button id="surpriseBtn">Surprise Me!</button></div>
    <div>
      <select id="numImagesSelect" onchange="numImagesToGen = Number(this.value); checkAllButtonStates();" value="[numImagesToGen]">
        <option value="0" selected>No Images</option>
        <option value="1">1 Image Block</option>
        <option value="2">2 Image Blocks</option>
        <option value="3">3 Image Blocks</option>
        <option value="4">4 Image Blocks</option>
        <option value="5">5 Image Blocks</option>
        <option value="6">6 Image Blocks</option>
        <option value="7">7 Image Blocks</option>
        <option value="8">8 Image Blocks</option>
        <option value="9">9 Image Blocks</option>
        <option value="10">10 Image Blocks</option>
      </select>
    </div>
    <div><input type="text" id="seedInput" placeholder="Seed (Leave Empty for Random)" value="" oninput="handleSeedInput(this.value);"></div>
    <div>
      <label for="masterCreativitySlider" style="display: block; margin-bottom: 5px; font-size: 0.7em;">Fuckery: <span id="masterCreativityValue">[masterCreativity]</span></label>
      <input type="range" id="masterCreativitySlider" min="0" max="10" step="1" value="[masterCreativity]" oninput="masterCreativity = Number(this.value); document.getElementById('masterCreativityValue').innerText = this.value; updateDerivedSettings();" title="Fuckery 0 = Guidance Scale 1 & Temperature 1.9 // Fuckery 10 = Guidance Scale 20 & Temperature 0.1" style="width: 100%;">
    </div></div>
    <div class="prompt-columns">
      <textarea id="positive-prompt" class="sync-ta" placeholder="Positive prompt..." rows="4"></textarea>
      <textarea id="negative-prompt" class="sync-ta" placeholder="Negative prompt..." rows="4"></textarea>
    </div>
  </div>
  </fieldset>
  </div><div id="output" class="output-area"></div>
 
 <script>
  // ====== CONSTANTS ======
  const DEFAULT_CREATIVITY_LEVEL = "4";
  const creativityMap = {
    "0": { gScale: 1, aiTemp: 1.9 },
    "1": { gScale: 3, aiTemp: 1.5 },
    "2": { gScale: 5, aiTemp: 1.2 },
    "3": { gScale: 6, aiTemp: 1.1 },
    "4": { gScale: 7, aiTemp: 1.0 },
    "5": { gScale: 8, aiTemp: 0.9 },
    "6": { gScale: 9, aiTemp: 0.8 },
    "7": { gScale: 10, aiTemp: 0.7 },
    "8": { gScale: 12, aiTemp: 0.5 },
    "9": { gScale: 15, aiTemp: 0.3 },
    "10": { gScale: 20, aiTemp: 0.1 }
  };
  const AI_REFINEMENT_INSTRUCTION = `
You are an world-renown expert prompt engineer that specialises in flawless text-to-image prompt design. Your task is to take the user's input and transform it into a masterful, holistically etailed, and visually inspiring descriptive prompt that paints a vivid work of art with words.

When refining, best practice is to analyze the user's prompt, deconstruct it into its core elements, and organise them into the categories. For any category that is lacking in quality, vague or missing from the users prompt, you have the opportunity to flex your immense creativivity. Pick the most suitable options from the corresponding list that anchors a balanced composition and intelligent red thread through the entire prompt, based on the user's original prompt and overall intent, except for Subject and Setting where you can just roll with what you got from the user's prompt. 

The categories are: 
Subject & Setting: The primary focus of the image, typically a person, animal, or object, and it's surroundings (Keep the user's original subject & setting and enhance it to the best of your ability, if it's missing, feel free to impress me with your creativity).
Artistic Style (artisticStyles): The visual identity and technique of the image. Could also be a specific artist or movement. 
Composition & Camera Perspective (composition): The arrangement of elements and point of view.
Lighting (lighting): The illumination and shadows, a key factor in creating the right athmosphere. 
Color Palette (colorPalettes): The dominant colors and tones, typically what draws a viewer in. 
Mood & Atmosphere (mood): The emotional tone and overall feeling of the image. 
Technical Details (technicalDetails): The technical aspects of the image, such as resolution, focus, and effects. 
Other Additional Elements (additionalElements): Any other elements that could enhance the image. 

Your goal is to manufacture a prompt that is cohesive, unified, and meticulusly orchestrated—everything fitting together naturally. The result should be a single, complete, refined prompt that would be suitable for a world-renown artist, photographer or designer. If any style, technical, or quality suggestion from the quality enhancement prefix conflicts with the user's vision, in that case consider the user's original prompt as master, focus on perfecting the prompt and keep it very close to their original vision while keeping the cohesion and consistancy in mind.`;
  
  const AI_SURPRISE_INSTRUCTION = `
You are a 'Mad Prompt Scientist'—a master of mixing different elements just to see what will happend. Your task is to create a completely chaotic, yet visually inspiring image prompt by mixing and matching different elements from the users input and the categories below. First, analyze the users original prompt and determine which of these categories below has gotten sufficiently described. For each category that is satisfactory fulfilled, keep the user's original theme. If a category is lacking in quality, vague or missing, replace it with a keyword/phrase from that specific category. As an added twist, always replace (reroll) at least one category with a new random keyword from its list, even if the user has described it well. If the user's prompt is empty, create a completely random prompt rolling new keywords for every single category and filling in the gaps with your own creativity. 

The categories are: 
Subject & Setting: (Keep the user's original subject & setting and enhance it to the best of your ability, if it's missing, feel free to impress me with your creativity).
Artistic Style: ({[artisticStyles.selectOne]}) is potentially the new visual identity and technique for the image (Could also be a specific artist or movement).
Composition & Camera Perspective: Is ({[composition.selectOne]}) what will guide the arrangement of elements and point of view?
Lighting: ({[lighting.selectOne]}) might be creating the right athmosphere through illumination and shadows.
Color Palette: The dominant colors and tones might be ({[colorPalettes.selectOne]}), and could be what draws the viewer in. 
Mood & Atmosphere: The emotional tone and overall feeling of the image could be ({[mood.selectOne]}).
Technical Details: Does ({[technicalDetails.selectOne]}) describe the perfect technical aspects of the image? 
Other Elements: Here comes a wildcard! What about adding ({[additionalElements.selectOne]}). 

As a Mad Prompt Scientist, embrace atomical transformation, playful invention, and unexpected or whimsical twists. Surprise the user by weaving together disparate or imaginative elements, but always produce a valid, visually inspiring image prompt. Embrace the chaos, have fun and flex your creativity, just make sure the result is a single, cohesive, and visually inspiring prompt. The result should be more detailed and varied than the original. If any input contains conflicting information just roll with it and embrace the unpredictable and paradoxical chaos!.`;

  const qualityEnhancementPrefix = `
    IMPORTANT: Do NOT use numerical weighting syntax (e.g., 'word:1.2'). If the user's original prompt contains weighted words or implies emphasis, translate that emphasis into descriptive language within the prompt. Make sure the prompt is 100% affirmative and avoid negative phrasing (e.g., 'no hats', 'not blurry'); instead, describe what IS desired. When appropriate, you can introduce creative variations by using the syntax '{Option A|Option B|Option C}' to allow the final prompt to randomly select one of the specified options. 
      
    Here are some exellent keywords you are free to add to the prompt, keep in mind not all of them are suitable for all prompts, but they are all excellent quality enhancers: 
      unbelievable masterpiece, 
      out of this world perfect, 
      cinematic work of art, 
      8K ultra-high resolution,
      mood invoking bokeh, 
      high dynamic range, 
      low degree of destracting elements like noise, 
      natural volumetric lighting, 
      iridescent moody lighting dramatically highlights and casts shadows invoking a dystopian ambiance, 
      larger-than-life color palette, 
      impressiveely balanced composition perfectly following the golden ratio, 
      thought provocing scale and perspective, 
      dimensional depth of field, 
      laser-sharp focus, 
      mpeccable attention to detail, 
      immersive and lifelike textures and materials, 
      visible blemishes and imperfections, 
      authentic familiar feeling material behavior, 
      precise physically accurate reflections and refractions, 
      action enhancing motion blur, 
      atmospheric real-life special effects, world-class post-processing, 
      natural film grain, 
      once in a lifetime captured lens flares, 
      trending on ArtStation, 
      award-winning, 
      innovative technical excellence,
      
    Do not add any of your own conversational text, greetings, explanations, or labels like 'Refined Prompt:'. Return ONLY the single, complete, refined prompt itself. Output ONLY the new and finalised prompt itself, with no category names, headlines, or explanations—just the prompt.`;

 // ====== DEBUG LOGGING =====
  console.log('Script loaded!');

  // ====== GLOBAL STATE =====
  const state = {
    isRefining: false,
    isSurprising: false,
    originalPrompt: null,
    currentPrompt: "",
    negativePrompt: "",
    imgSeed: -1,
    numImagesToGen: 0,
    masterCreativity: 4
  };

  // ====== DOM INITIALIZATION =====
  document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM fully loaded!');

    // Get buttons
    const refineBtn = document.getElementById('refineBtn');
    if (!refineBtn) {
      console.error('Refine button not found!');
      return;
    }

    // Bind event listeners
    refineBtn.addEventListener('click', handleRefineClick);
    console.log('Refine button event listener bound!');
  });

  // ====== EVENT HANDLERS =====
  function handleRefineClick() {
    console.log('Refine button clicked!');
    if (state.isRefining) {
      console.log('Already refining, skipping.');
      return;
    }

    state.isRefining = true;
    executePromptRefinement().finally(() => {
      state.isRefining = false;
    });
  }

  // ====== REFINE FUNCTION =====
  async function executePromptRefinement() {
    console.log('Starting refinement...');
    try {
      const positivePromptInput = document.getElementById('positive-prompt');
      if (!positivePromptInput) {
        throw new Error('Positive prompt input not found!');
      }

      const negativePromptInput = document.getElementById('negative-prompt');
      if (!negativePromptInput) {
        throw new Error('Negative prompt input not found!');
      }

      // Lock negative prompt during refinement
      negativePromptInput.readOnly = true;
      negativePromptInput.style.opacity = '0.5';
      negativePromptInput.style.cursor = 'not-allowed';

      // Get keywords (ensure this returns a valid array)
      const keywords = getRandomKeywords();
      if (!keywords || !keywords.length) {
        throw new Error('No keywords available for refinement!');
      }

      console.log('Keywords:', keywords);
      await typeKeywords(positivePromptInput, keywords);

      // Restore negative prompt
      negativePromptInput.readOnly = false;
      negativePromptInput.style.opacity = '1';
      negativePromptInput.style.cursor = 'text';

      console.log('Refinement complete!');
    } catch (error) {
      console.error('Refinement failed:', error);
    }
  }

  // ====== HELPER FUNCTIONS =====
  function getRandomKeywords() {
    try {
      // Safely access Perchance lists with fallbacks
      const artisticStyles = window.artisticStyles || [];
      const lighting = window.lighting || [];
      const colorPalettes = window.colorPalettes || [];

      // Combine lists and return a random subset
      const allKeywords = [...artisticStyles, ...lighting, ...colorPalettes];
      if (!allKeywords.length) return [];

      const shuffled = allKeywords.sort(() => 0.5 - Math.random());
      return shuffled.slice(0, 5); // Return 5 random keywords
    } catch (error) {
      console.error('Failed to get keywords:', error);
      return [];
    }
  }

  async function typeKeywords(element, keywords, delay = 100) {
    if (!element || !keywords || !keywords.length) {
      console.error('Invalid input for typeKeywords!');
      return;
    }

    const originalContent = element.value;
    for (const keyword of keywords) {
      element.value = keyword;
      await new Promise(resolve => setTimeout(resolve, delay));
    }
    element.value = originalContent;
  }

  // ====== DOM INITIALIZATION =====
  document.addEventListener('DOMContentLoaded', function() {
    // Get all DOM elements
    const elements = {
      generateBtn: document.getElementById('generateBtn'),
      refineBtn: document.getElementById('refineBtn'),
      surpriseBtn: document.getElementById('surpriseBtn'),
      positivePrompt: document.getElementById('positive-prompt'),
      negativePrompt: document.getElementById('negative-prompt'),
      seedInput: document.getElementById('seedInput'),
      creativitySlider: document.getElementById('masterCreativitySlider'),
      creativityValue: document.getElementById('masterCreativityValue'),
      numImagesSelect: document.getElementById('numImagesSelect')
    };

    // Initialize event listeners
    if (elements.generateBtn) {
      elements.generateBtn.addEventListener('click', handleGenerate);
    }
    
    if (elements.refineBtn) {
      elements.refineBtn.addEventListener('click', handleRefine);
    }
    
    if (elements.surpriseBtn) {
      elements.surpriseBtn.addEventListener('click', handleSurprise);
    }

    // Initialize other interactive elements
    if (elements.creativitySlider) {
      elements.creativitySlider.addEventListener('input', function() {
        state.masterCreativity = Number(this.value);
        if (elements.creativityValue) {
          elements.creativityValue.innerText = this.value;
        }
        updateDerivedSettings();
      });
    }

    if (elements.seedInput) {
      elements.seedInput.addEventListener('input', function() {
        const value = this.value.trim();
        state.imgSeed = value === '' || value === '-1' ? -1 : Number(value);
      });
    }

    if (elements.numImagesSelect) {
      elements.numImagesSelect.addEventListener('change', function() {
        state.numImagesToGen = Number(this.value);
        updateButtonStates();
      });
    }

    // Initialize prompt fields
    if (elements.positivePrompt) {
      elements.positivePrompt.addEventListener('input', function() {
        state.currentPrompt = this.value;
        updateButtonStates();
      });
    }

    if (elements.negativePrompt) {
      elements.negativePrompt.addEventListener('input', function() {
        state.negativePrompt = this.value;
      });
    }

    // Initial setup
    updateButtonStates();
    updateDerivedSettings();
  });

  // ====== CORE FUNCTIONS =====
  function handleGenerate() {
    if (!state.currentPrompt.trim()) {
      alert("Please enter a positive prompt first!");
      return;
    }
    
    if (state.numImagesToGen <= 0) {
      alert("Please select at least 1 image to generate!");
      return;
    }
    
    // Your image generation logic here
    console.log("Generating images with prompt:", state.currentPrompt);
  }

  function handleRefine() {
    if (state.isRefining) {
      cancelRefinement();
      return;
    }
    
    if (!state.currentPrompt.trim()) {
      alert("Please enter a prompt to refine!");
      return;
    }
    
    state.isRefining = true;
    state.originalPrompt = state.currentPrompt;
    
    // Update UI
    const refineBtn = document.getElementById('refineBtn');
    if (refineBtn) refineBtn.textContent = "Cancel";
    
    // Start refinement process
    executeRefinement();
  }

  function handleSurprise() {
    if (state.isSurprising) {
      cancelSurprise();
      return;
    }
    
    state.isSurprising = true;
    state.originalPrompt = state.currentPrompt;
    
    // Update UI
    const surpriseBtn = document.getElementById('surpriseBtn');
    if (surpriseBtn) surpriseBtn.textContent = "Cancel";
    
    // Start surprise process
    executeSurprise();
  }

  function executeRefinement() {
    // Your refinement logic here
    console.log("Refining prompt:", state.currentPrompt);
    
    // Simulate async operation
    setTimeout(() => {
      if (state.isRefining) {
        // Update prompt with refined version
        const positivePrompt = document.getElementById('positive-prompt');
        if (positivePrompt) {
          positivePrompt.value = "Refined: " + state.currentPrompt;
          state.currentPrompt = positivePrompt.value;
        }
        
        finishRefinement();
      }
    }, 2000);
  }

  function executeSurprise() {
    // Your surprise logic here
    console.log("Creating surprise prompt");
    
    // Simulate async operation
    setTimeout(() => {
      if (state.isSurprising) {
        // Update prompt with surprise version
        const positivePrompt = document.getElementById('positive-prompt');
        if (positivePrompt) {
          positivePrompt.value = "Surprise: " + state.currentPrompt;
          state.currentPrompt = positivePrompt.value;
        }
        
        finishSurprise();
      }
    }, 2000);
  }

  function cancelRefinement() {
    state.isRefining = false;
    const refineBtn = document.getElementById('refineBtn');
    if (refineBtn) refineBtn.textContent = "Refine Prompt";
  }

  function cancelSurprise() {
    state.isSurprising = false;
    const surpriseBtn = document.getElementById('surpriseBtn');
    if (surpriseBtn) surpriseBtn.textContent = "Surprise Me!";
  }

  function finishRefinement() {
    state.isRefining = false;
    const refineBtn = document.getElementById('refineBtn');
    if (refineBtn) refineBtn.textContent = "Undo Refinement";
    updateButtonStates();
  }

  function finishSurprise() {
    state.isSurprising = false;
    const surpriseBtn = document.getElementById('surpriseBtn');
    if (surpriseBtn) surpriseBtn.textContent = "Undo Surprise";
    updateButtonStates();
  }

  function updateButtonStates() {
    const elements = {
      generateBtn: document.getElementById('generateBtn'),
      refineBtn: document.getElementById('refineBtn'),
      surpriseBtn: document.getElementById('surpriseBtn')
    };
    
    // Enable/disable generate button
    if (elements.generateBtn) {
      elements.generateBtn.disabled = !state.currentPrompt.trim() || state.numImagesToGen <= 0;
    }
    
    // Enable/disable refine button
    if (elements.refineBtn) {
      elements.refineBtn.disabled = !state.currentPrompt.trim() || state.isSurprising;
      
      if (elements.refineBtn.textContent === "Undo Refinement") {
        elements.refineBtn.disabled = state.originalPrompt === null;
      }
    }
    
    // Enable/disable surprise button
    if (elements.surpriseBtn) {
      elements.surpriseBtn.disabled = state.isRefining;
      
      if (elements.surpriseBtn.textContent === "Undo Surprise") {
        elements.surpriseBtn.disabled = state.originalPrompt === null;
      }
    }
  }

  function updateDerivedSettings() {
    const mc = Number(state.masterCreativity); 
    const selectedSettings = creativityMap[String(mc)] || creativityMap[DEFAULT_CREATIVITY_LEVEL]; 
    currentGScale = selectedSettings.gScale;
    currentAiTemperature = selectedSettings.aiTemp;
    currentGScale = Math.max(1, Math.min(30, currentGScale));
    currentAiTemperature = Math.max(0.01, Math.min(2.0, currentAiTemperature));
    const valueDisplay = document.getElementById('masterCreativityValue');
    if (valueDisplay) { valueDisplay.innerText = mc; }
  }

  function handleSeedInput(value) {
    const trimmedValue = value.trim();
    if (trimmedValue === '' || trimmedValue === '-1') { state.imgSeed = -1; } 
    else { const numValue = Number(trimmedValue); state.imgSeed = isNaN(numValue) ? -1 : numValue; }
  }

  // ====== UTILITY FUNCTIONS ======
  /**
   * Extract only the final prompt from AI output, if a label is present.
   * @param {string} text
   * @returns {string}
   */
  function extractFinalPrompt(text) {
    const match = text.match(/(?:Prompt:)\s*([\s\S]*)/i);
    return match ? match[1].trim() : text.trim();
  }

  /**
   * Safely set the prompt input value, escaping HTML entities.
   * @param {string} text
   */
  function setPromptInputValue(text) {
    const safeText = text.replace(/[<>&"]/g, c => ({
      '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;'
    }[c]));
    const promptInput = document.getElementById('promptInput');
    if (promptInput) {
      promptInput.value = safeText;
      state.currentPrompt = safeText;
      promptInput.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  // ====== IMAGE GENERATION LOGIC ======
  function buildImageGenerationHtml() {
    updateDerivedSettings();
    const n = Number(state.numImagesToGen);
    let outputHtml = "";
    const prompt = (typeof state.currentPrompt === 'string' ? state.currentPrompt : "").trim();

    // Debug: Log the seed being used
    const seedoutput = state.imgSeed !== -1 ? state.imgSeed : Math.floor(Math.random() * 10000000);
    console.log(`Using seed: ${seedoutput}`);

    // Generate blocks
    for (let i = 0; i < n; i++) {
      if (Math.random() < 0.3) { // SoloBlock

          outputHtml += `<div class="quad-cell wide">${[image({

        outputHtml += `<div class="quad-cell narrow">${[image({
          prompt: prompt,
          negativePrompt: state.negativePrompt,
          seed: state.imgSeed,
          guidanceScale: currentGScale,
          resolution: "512x768",

          onFinish: (result) => {
            let iframe = result.iframe;

            if (iframe && canvas) iframe.replaceWith(canvas);
          }
        })]}</div>`;
        outputHtml += '</div>';
        
        // Bottom row (768x512 + 512x512)
        outputHtml += '<div class="quad-row bottom-row">';
        outputHtml += `<div class="quad-cell wide">${[image({
          prompt: prompt,
          negativePrompt: state.negativePrompt,
          seed: state.imgSeed,
          guidanceScale: currentGScale,
          resolution: "768x512",

          onFinish: (result) => {
            let iframe = result.iframe;
            let canvas = result.canvas;
            if (iframe && canvas) iframe.replaceWith(canvas);
          }
        })]}</div>`;
        outputHtml += `<div class="quad-cell narrow">${[image({
          prompt: prompt,

          seed: state.imgSeed,
          guidanceScale: currentGScale,
          resolution: "512x512",
          evaluateItem: prompt,
          onFinish: (result) => {
            let iframe = result.iframe;
            let canvas = result.canvas;
            if (iframe && canvas) iframe.replaceWith(canvas);
          }
        })]}</div>`;
        outputHtml += '</div></div>'; // Close quad-block
      }
    }
    return outputHtml;
  }

  // Updated handleGenerateImages (removed canvas replacement)
  function handleGenerateImages() {

  // ====== BUTTON STATE LOGIC ======
  function checkAllButtonStates() {
    const generateBtn = document.getElementById('generateBtn');

    const isProcessing = state.isRefining || state.isSurprising;

    if (generateBtn) {

    if (surpriseBtn) {
      if (surpriseBtn.innerText !== "Undo Surprise") {

  function handleGenerateImages() {

  function handleRefine() {

  // Get random keywords from Perchance lists
  function getRandomKeywords() {
    try {
      // First check if perchance and its lists are available
      if (!perchance || !perchance.artisticStyles) {
        console.warn('Perchance lists not available, using fallback keywords');
        return ['cinematic', 'detailed', 'vibrant', 'surreal', 'fantasy'];
      }
      
      // Safely access all lists with fallbacks
      const lists = {
        artisticStyles: perchance.artisticStyles || [],
        lighting: perchance.lighting || [],
        colorPalettes: perchance.colorPalettes || [],
        composition: perchance.composition || [],
        mood: perchance.mood || [],
        technicalDetails: perchance.technicalDetails || [],
        additionalElements: perchance.additionalElements || []
      };
      
      // Combine all keywords into one array
      const allKeywords = Object.values(lists).flat();
      
      // Return 20 random keywords or all if less than 20
      return allKeywords.length > 0 
        ? [...allKeywords].sort(() => 0.5 - Math.random()).slice(0, 20)
        : ['cinematic', 'detailed', 'vibrant'];
    } catch (e) {
      console.error('Error in getRandomKeywords:', e);
      return ['surreal', 'fantasy', 'abstract'];
    }
  }

  // Typing effect for keywords with additional safety checks
  async function typeKeywords(element, keywords, delay = 100) {
    if (!element || !keywords || !keywords.length) {
      console.error('Invalid input for typeKeywords!');
      return;
    }

    const originalContent = element.value;
    for (const keyword of keywords) {
      element.value = keyword;
      await new Promise(resolve => setTimeout(resolve, delay));
    }
    element.value = originalContent;
  }

  // Creates an image URL from Pollinations.ai based on the prompt
  function getPollinationsUrl(prompt, params = {}) {
    const defaultParams = {
      width: 1024, 
      height: 1024, 
      model: "flux", 
      nologo: true
    };
    const finalParams = {...defaultParams, ...params};
    const queryParams = new URLSearchParams(finalParams);
    const encodedPrompt = encodeURIComponent(prompt);
    return `https://image.pollinations.ai/prompt/${encodedPrompt}?${queryParams.toString()}`;
  }

 <script>
  // ====== CONSTANTS ======
  const DEFAULT_CREATIVITY_LEVEL = "4";
  const creativityMap = {
    "0": { gScale: 1, aiTemp: 1.9 },

    "2": { gScale: 5, aiTemp: 1.2 },
    "3": { gScale: 6, aiTemp: 1.1 },

    "5": { gScale: 8, aiTemp: 0.9 },
    "6": { gScale: 9, aiTemp: 0.8 },
    "7": { gScale: 10, aiTemp: 0.7 },
    "8": { gScale: 12, aiTemp: 0.5 },
    "9": { gScale: 15, aiTemp: 0.3 },
    "10": { gScale: 20, aiTemp: 0.1 }
  };
  const AI_REFINEMENT_INSTRUCTION = `
You are an expert prompt engineer specializing in text-to-image prompt making. Your task is to take the user's input and transform it into a highly effective, specific, and descriptive prompt.

When refining, consider and incorporate these categories as appropriate: Subject, Setting, Artistic Style (artisticStyles), Composition & Camera Perspective (composition), Lighting (lighting), Color Palette (colorPalettes), Mood & Atmosphere (mood), Technical Details (technicalDetails) and Additional Elements (additionalElements).

For any category that is missing or vague (except for Subject and Setting), choose the most suitable value from the corresponding list, based on the user's original prompt and the overall artistic intent. Focus on keeping the user's original intent and style very cohesive and consistent. For Subject and Setting, preserve or clarify the user's main idea.

IMPORTANT: Do NOT use numerical weighting syntax (e.g., 'word:1.2'). If the user's original prompt contains weighted words or implies emphasis, translate that emphasis into descriptive language within the prompt. Make sure the prompt is 100% affirmative and avoid negative phrasing (e.g., 'no hats', 'not blurry'); instead, describe what IS desired. When appropriate, you can introduce creative variations by using the syntax '{Option A|Option B|Option C}' to allow the final prompt to randomly select one of the specified options.

Your goal is to create a prompt that is cohesive, unified, and professional—everything should fit together naturally. The result should be a single, complete, refined prompt that would be suitable for a professional artist or designer. Do not add any of your own conversational text, greetings, explanations, or labels like 'Refined Prompt:'. Return ONLY the single, complete, refined prompt itself.
If any style, technical, or quality suggestion from the quality enhancement prefix conflicts with the user's input, randomization, or chosen style, always prioritize the user's intent or chosen style as the master.`;

  const AI_SURPRISE_INSTRUCTION = `
You are a 'Prompt Alchemist'—a master of creative transformation. Analyze the following prompt and determine which of these categories are already sufficiently described: Artistic Styles, Composition & Camera Perspective, Lighting, Color Palette, Mood & Atmosphere, Technical Details and finally any Additional Elements or other relevant categories.

For each category that is sufficiently described, keep the user's original wording. For any category that is missing or vague, fill it in based on a random value from these lists: Artistic Style ({[artisticStyles.selectOne]}), Composition & Camera Perspective ({[composition.selectOne]}), Lighting ({[lighting.selectOne]}), Color Palette ({[colorPalettes.selectOne]}), Mood & Atmosphere ({[mood.selectOne]}), Technical Details: ({[technicalDetails.selectOne]}) and Additional Elements ({[additionalElements.selectOne]}). Always replace (reroll) at least one category with a random value from its list, even if the user has already described it.

IMPORTANT: Do NOT use numerical weighting syntax (e.g., 'word:1.2'). If the user's original prompt contains weighted words or implies emphasis, translate that emphasis into descriptive language within the prompt. Make sure the prompt is 100% affirmative and avoid negative phrasing (e.g., 'no hats', 'not blurry'); instead, describe what IS desired. When appropriate, you can introduce creative variations by using the syntax '{Option A|Option B|Option C}' to allow the final prompt to randomly select one of the specified options.

As a Prompt Alchemist, embrace magical transformation, playful invention, and unexpected or whimsical twists. Surprise the user by weaving together disparate or imaginative elements, but always produce a valid, visually inspiring image prompt. The result should be a fun, imaginative, and surprising prompt, but still a single, natural-sounding prompt. Do not list the categories or label them. Output ONLY the new prompt itself, with no category names, headlines, or explanations—just the prompt.
If any style, technical, or quality suggestion from the quality enhancement prefix conflicts with the user's input, randomization, or chosen style, always prioritize the user's intent or random style as the master.`;

  const qualityEnhancementPrefix = "photorealistic masterpiece, ultra-realistic, cinematic, work of art, 8K, professional camera, DSLR, 50mm lens, f/1.8, ISO 100, bokeh, high dynamic range, low noise, natural volumetric lighting, realistic and dramatic shadows and highlights, true-to-life color palette, impressive and balanced composition, accurate scale and perspective, realistic depth of field, sharp focus, impeccable attention to detail, immersive, lifelike textures and materials, visible blemishes and imperfections, authentic material behavior, precise reflections and refractions, realistic motion blur, atmospheric effects, world-class post-processing, film grain, lens flare, trending on ArtStation, award-winning, technical excellence";

  // ====== UTILITY FUNCTIONS ======
  /**
   * Extract only the final prompt from AI output, if a label is present.
   * @param {string} text
   * @returns {string}
   */
  function extractFinalPrompt(text) {
    const match = text.match(/(?:Surprise Prompt:|Refined Prompt:)\s*([\s\S]*)/i);
    return match ? match[1].trim() : text.trim();
  }

  /**
   * Safely set the prompt input value, escaping HTML entities.
   * @param {string} text
   */
  function setPromptInputValue(text) {
    const safeText = text.replace(/[<>&"]/g, c => ({
      '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;'
    }[c]));
    const promptInput = document.getElementById('promptInput');
    if (promptInput) {
      promptInput.value = safeText;
      mainPromptContent = safeText;
      promptInput.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  // ====== GLOBAL STATE ======
  window.isRefiningNow = false;
  window.refinementInterval = null;
  window.shouldCancelRefinement = false;
  window.originalPromptBeforeRefinement = null;
  window.promptBeforeSurprise = null; 
  window.isSurprisingNow = false;
  window.surpriseInterval = null;
  window.shouldCancelSurprise = false;

  let currentGScale;
  let currentAiTemperature;

  // ====== SETTINGS AND UI LOGIC ======
  function updateDerivedSettings() {
    const mc = Number(masterCreativity); 
    const selectedSettings = creativityMap[String(mc)] || creativityMap[DEFAULT_CREATIVITY_LEVEL]; 
    currentGScale = selectedSettings.gScale;
    currentAiTemperature = selectedSettings.aiTemp;
    currentGScale = Math.max(1, Math.min(30, currentGScale));
    currentAiTemperature = Math.max(0.01, Math.min(2.0, currentAiTemperature));
    const valueDisplay = document.getElementById('masterCreativityValue');
    if (valueDisplay) { valueDisplay.innerText = mc; }
  }

  function handleSeedInput(value) {
    const trimmedValue = value.trim();
    if (trimmedValue === '' || trimmedValue === '-1') { imgSeed = -1; } 
    else { const numValue = Number(trimmedValue); imgSeed = isNaN(numValue) ? -1 : numValue; }
  }

  // ====== PROMPT REFINEMENT LOGIC ======
  function handleRefineButtonClick() {
    const refineButton = document.getElementById('refineBtn');
    const promptInput = document.getElementById('promptInput');
    // Check if prompt is empty
    const currentPrompt = (typeof mainPromptContent === 'string' ? mainPromptContent : "").trim();
    if (!currentPrompt) {
      // Store original text
      refineButton.dataset.originalText = refineButton.innerText;
      // Show error on button
      refineButton.innerText = "Enter prompt";
      // Reset button text after delay
      setTimeout(() => {
        if (refineButton.dataset.originalText) {
          refineButton.innerText = refineButton.dataset.originalText;
          delete refineButton.dataset.originalText;
        }
      }, 3000);
      return;
    }
    if (window.isRefiningNow) { cancelRefinement(); } 
    else if (refineButton && refineButton.innerText === "Undo Refinement") {
      if (window.originalPromptBeforeRefinement !== null && promptInput) {
        setOrRestorePromptValue(window.originalPromptBeforeRefinement);
        window.originalPromptBeforeRefinement = null;
        refineButton.innerText = "Refine Prompt";
        checkAllButtonStates();
      } 
    } else { updateDerivedSettings(); executePromptRefinement(); }
  }

  function cancelRefinement() { window.shouldCancelRefinement = true; }

  function handleManualPromptChange() {
    const currentPromptText = document.getElementById('promptInput').value;
    const refineButton = document.getElementById('refineBtn');
    if (refineButton && !window.isRefiningNow && refineButton.innerText === "Undo Refinement") {
      if (window.originalPromptBeforeRefinement !== null) {
        refineButton.disabled = false;
      }
      if (currentPromptText !== window.originalPromptBeforeRefinement) {
        refineButton.innerText = "Refine Prompt";
        window.originalPromptBeforeRefinement = null;
      }
    }
    const surpriseBtn = document.getElementById('surpriseBtn');
    if (surpriseBtn && surpriseBtn.innerText.includes("Undo Surprise")) {
      if (window.promptBeforeSurprise !== null) {
        surpriseBtn.disabled = false;
      }
      if (currentPromptText !== window.promptBeforeSurprise) {
        surpriseBtn.innerText = "Surprise Me!";
        window.promptBeforeSurprise = null;
      }
    }
    checkAllButtonStates();
  }

  /**
   * Asynchronously refines the user's prompt using the AI.
   */
  async function executePromptRefinement() {
    const refineButton = document.getElementById('refineBtn');
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const surpriseBtn = document.getElementById('surpriseBtn'); 
    if (window.isRefiningNow) { return; }
    const currentPromptForAI = (typeof mainPromptContent === 'string' ? mainPromptContent : "").trim();
    if (!currentPromptForAI) {
      if (refineButton && refineButton.innerText === "Undo Refinement") { refineButton.innerText = "Refine Prompt"; }
      return;
    }
    window.isRefiningNow = true;
    window.shouldCancelRefinement = false;
    window.originalPromptBeforeRefinement = currentPromptForAI;
    if (refineButton) { refineButton.innerText = "Cancel (0s)"; }
    if (promptInput) { promptInput.readOnly = true; promptInput.style.opacity = '0.5'; promptInput.style.cursor = 'not-allowed'; }
    if (generateBtn) { generateBtn.disabled = true; }
    if (surpriseBtn) { surpriseBtn.disabled = true; }
    let secondsPassed = 0;
    if (window.refinementInterval) clearInterval(window.refinementInterval);
    window.refinementInterval = setInterval(() => {
      secondsPassed++;
      if (refineButton && window.isRefiningNow) { refineButton.innerText = `Cancel (${secondsPassed}s)`; }
    }, 1000);
    let actualGeneratedText = "";
    try {
      // Compose the AI prompt
      const promptForAIPlugin = qualityEnhancementPrefix + ". " + AI_REFINEMENT_INSTRUCTION + "\n\nUser's original prompt: " + currentPromptForAI;
      const aiOptions = { temperature: Number(currentAiTemperature) };
      await new Promise(resolve => setTimeout(resolve, 50));
      const aiOperation = ai(promptForAIPlugin, aiOptions); 
      const checkCancellation = new Promise((resolve, reject) => {
        const checkInterval = setInterval(() => {
          if (window.shouldCancelRefinement) { clearInterval(checkInterval); reject(new Error('Refinement cancelled by user')); }
        }, 250);
        aiOperation.then(() => clearInterval(checkInterval)).catch(() => clearInterval(checkInterval));
      });
      const refinedTextObject = await Promise.race([aiOperation, checkCancellation]);
      if (!window.shouldCancelRefinement) {
        let tempText = "";
        if (refinedTextObject && typeof refinedTextObject.generatedText === 'string') { tempText = refinedTextObject.generatedText.trim(); } 
        else if (refinedTextObject && typeof refinedTextObject.text === 'string') { tempText = refinedTextObject.text.trim(); } 
        else if (refinedTextObject && typeof refinedTextObject === 'string') { tempText = refinedTextObject.toString().trim(); }
        actualGeneratedText = extractFinalPrompt(tempText);
        setOrRestorePromptValue(actualGeneratedText);
      }
    } catch (error) { /* console.error("Error during AI prompt refinement: ", error.message); */ } 
    finally {
      if (window.refinementInterval) { clearInterval(window.refinementInterval); window.refinementInterval = null; }
      window.isRefiningNow = false;
      if (refineButton) {
        if (!window.shouldCancelRefinement && actualGeneratedText && actualGeneratedText !== "" && actualGeneratedText !== window.originalPromptBeforeRefinement) {
          refineButton.innerText = "Undo Refinement";
        } else {
          refineButton.innerText = "Refine Prompt";
          if (promptInput && promptInput.value !== window.originalPromptBeforeRefinement && window.originalPromptBeforeRefinement !== null) {
            setOrRestorePromptValue(window.originalPromptBeforeRefinement);
          }
          window.originalPromptBeforeRefinement = null; 
        }
      }
      if (promptInput) { promptInput.readOnly = false; promptInput.style.opacity = '1'; promptInput.style.cursor = ''; }
      if (surpriseBtn) { surpriseBtn.disabled = false; }
      checkAllButtonStates(); 
      window.shouldCancelRefinement = false;
    }
  }

  // ====== SURPRISE ME LOGIC ======
  function handleSurpriseMeClick() {
    const surpriseBtn = document.getElementById('surpriseBtn');
    const promptInput = document.getElementById('promptInput');
    if (window.isSurprisingNow) { cancelSurprise(); } else if (surpriseBtn && surpriseBtn.innerText === "Undo Surprise") {
      if (window.promptBeforeSurprise !== null && promptInput) {
        setOrRestorePromptValue(window.promptBeforeSurprise);
        window.promptBeforeSurprise = null;
        surpriseBtn.innerText = "Surprise Me!";
        checkAllButtonStates();

      updateDerivedSettings();
      executeSurpriseMe();

  }

  function cancelSurprise() {
    window.shouldCancelSurprise = true;
  }

  /**
   * Asynchronously generates a surprising prompt using the AI.
   */
  async function executeSurpriseMe() {
    const surpriseBtn = document.getElementById('surpriseBtn');
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const refineBtn = document.getElementById('refineBtn');
    if (window.isSurprisingNow) { return; }
    const currentPromptForAI = (typeof mainPromptContent === 'string' ? mainPromptContent : "").trim();
    window.isSurprisingNow = true;
    window.shouldCancelSurprise = false;
    window.promptBeforeSurprise = currentPromptForAI;
    if (surpriseBtn) { surpriseBtn.innerText = "Cancel (0s)"; }
    if (promptInput) { 
      promptInput.readOnly = true; 
      promptInput.style.opacity = '0.5'; 
      promptInput.style.cursor = 'not-allowed'; 
    }
    if (generateBtn) { generateBtn.disabled = true; }
    if (refineBtn) { refineBtn.disabled = true; }
    let secondsPassed = 0;
    if (window.surpriseInterval) clearInterval(window.surpriseInterval);
    window.surpriseInterval = setInterval(() => {
      secondsPassed++;
      if (surpriseBtn && window.isSurprisingNow) { 
        surpriseBtn.innerText = `Cancel (${secondsPassed}s)`; 
      }
    }, 1000);
    let actualGeneratedText = "";
    try {
      // Compose the AI prompt
      const useQualityEnhancement = Math.random() < 0.5;
      const promptForAIPlugin = (useQualityEnhancement ? qualityEnhancementPrefix + ". " : "") + AI_SURPRISE_INSTRUCTION + "\n\nUser's original prompt: " + currentPromptForAI;
      const aiOptions = { temperature: Number(currentAiTemperature) };
      await new Promise(resolve => setTimeout(resolve, 50));
      const aiOperation = ai(promptForAIPlugin, aiOptions);
      const checkCancellation = new Promise((resolve, reject) => {
        const checkInterval = setInterval(() => {
          if (window.shouldCancelSurprise) { 
            clearInterval(checkInterval); 
            reject(new Error('Surprise cancelled by user')); 
          }
        }, 250);
        aiOperation.then(() => clearInterval(checkInterval)).catch(() => clearInterval(checkInterval));
      });
      const newPrompt = await Promise.race([aiOperation, checkCancellation]);
      if (!window.shouldCancelSurprise) {
        actualGeneratedText = (typeof newPrompt === 'string' ? newPrompt : (newPrompt && newPrompt.generatedText) || "").trim();
        actualGeneratedText = extractFinalPrompt(actualGeneratedText);
        setOrRestorePromptValue(actualGeneratedText);
      }
    } catch (error) {
      // Fallback in case of error or cancellation
      if (!window.shouldCancelSurprise) {
        const fb = ["Fallback: An impossible landscape under alien skies", "Fallback: A forgotten melody taking physical form"];
        actualGeneratedText = fb[Math.floor(Math.random() * fb.length)];
        setOrRestorePromptValue(actualGeneratedText);
      }
    } finally {
      if (window.surpriseInterval) { 
        clearInterval(window.surpriseInterval); 
        window.surpriseInterval = null; 
      }
      window.isSurprisingNow = false;
      if (surpriseBtn) {
        if (!window.shouldCancelSurprise && actualGeneratedText && actualGeneratedText !== "" && actualGeneratedText !== window.promptBeforeSurprise) {
          surpriseBtn.innerText = "Undo Surprise";
        } else {
          surpriseBtn.innerText = "Surprise Me!";
          if (promptInput && promptInput.value !== window.promptBeforeSurprise && window.promptBeforeSurprise !== null) {
            setOrRestorePromptValue(window.promptBeforeSurprise);
          }
          window.promptBeforeSurprise = null;
        }
      }
      if (promptInput) { 
        promptInput.readOnly = false; 
        promptInput.style.opacity = '1'; 
        promptInput.style.cursor = ''; 
      }
      if (refineBtn) { refineBtn.disabled = false; }
      checkAllButtonStates();
      window.shouldCancelSurprise = false;
    }
  }

  // ====== IMAGE GENERATION LOGIC ======
  function buildImageGenerationHtml() {
    updateDerivedSettings();
    const n = Number(numImagesToGen);
    let outputHtml = "";
    const currentPromptTextForImage = (typeof mainPromptContent === 'string' ? mainPromptContent : "default prompt").toString().trim();
    const escapedPromptContentForImage = currentPromptTextForImage.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');

    function getOptionsString(baseSeed, seedModifier) {
        let parsedGlobalSeed = Number(baseSeed);
        if (isNaN(parsedGlobalSeed)) { parsedGlobalSeed = -1; }
        let currentSeedForCall = parsedGlobalSeed;
        if (currentSeedForCall !== -1) { currentSeedForCall += seedModifier; }
        const opts = 'guidanceScale:' + currentGScale + ', seed:' + currentSeedForCall + ', hideGalleryButtons:true';
        return opts;
    }

    // Generate the 4-image blocks
    for (let i = 0; i < n; i++) {
        const blockSeedOffset = i * 4;
        const imgA = '[image("' + escapedPromptContentForImage + '", {resolution:"768x768", ' + getOptionsString(imgSeed, blockSeedOffset + 1) + '})]';
        const imgB = '[image("' + escapedPromptContentForImage + '", {resolution:"512x768", ' + getOptionsString(imgSeed, blockSeedOffset + 2) + '})]';
        const imgC = '[image("' + escapedPromptContentForImage + '", {resolution:"768x512", ' + getOptionsString(imgSeed, blockSeedOffset + 3) + '})]';
        const imgD = '[image("' + escapedPromptContentForImage + '", {resolution:"512x512", ' + getOptionsString(imgSeed, blockSeedOffset + 4) + '})]';

        const arrangements = [
            [[imgA, imgB], [imgC, imgD]],
            [[imgB, imgA], [imgD, imgC]],
            [[imgC, imgD], [imgA, imgB]],
            [[imgD, imgC], [imgB, imgA]],
        ];
        const chosen = arrangements[Math.floor(Math.random() * arrangements.length)];
        outputHtml += '<div class="image-block">';
        outputHtml += ' <div class="image-row">' + chosen[0][0] + chosen[0][1] + '</div>';
        outputHtml += ' <div class="image-row">' + chosen[1][0] + chosen[1][1] + '</div>';
        outputHtml += '</div>';
    }

    // Add the 5th block with a single large image (1280x1280)
    const largeImageSeedOffset = n * 4 + 1; // Adjust seed for the large image
    const largeImageParams = {
        width: 1280,
        height: 1280,
        seed: imgSeed !== -1 ? imgSeed + largeImageSeedOffset : undefined,
        model: "flux", // Default model
        nologo: true // Disable logo overlay
    };
    
    // Create the large image block
    outputHtml += '<div class="image-block" id="large-image-block">';
    outputHtml += ' <div class="image-row"></div>'; // Placeholder for the large image
    outputHtml += '</div>';

    // Fetch and display the large image
    fetchImage(currentPromptTextForImage, largeImageParams)
        .then(() => console.log("Large image fetched successfully."))
        .catch(error => console.error("Error fetching large image:", error));

    return outputHtml;
  }

  // Add the fetchImage function to your script
  async function fetchImage(prompt, params = {}) {
    const defaultParams = {
        // width: 1024, height: 1024 // Defaults are handled by API
    };
    const queryParams = new URLSearchParams({ ...defaultParams, ...params });
    const encodedPrompt = encodeURIComponent(prompt);
    const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?${queryParams.toString()}`;

    console.log("Fetching image from:", url);

    try {
        const response = await fetch(url);
        if (!response.ok) {
            const errorText = await response.text(); // Get error details if possible
            throw new Error(
                `HTTP error! status: ${response.status}, message: ${errorText}`
            );
        }
        const imageBlob = await response.blob();
        const imageUrl = URL.createObjectURL(imageBlob);

        // Display the image in the 5th block
        const largeImageBlock = document.getElementById('large-image-block');
        if (largeImageBlock) {
            const img = document.createElement("img");
            img.src = imageUrl;
            img.alt = prompt;
            img.style.width = "100%"; // Ensure the image fits the block
            largeImageBlock.querySelector('.image-row').innerHTML = ''; // Clear any existing content
            largeImageBlock.querySelector('.image-row').appendChild(img); // Append the image to the block
        }
        console.log("Image fetched and displayed successfully.");
    } catch (error) {
        console.error("Error fetching image:", error);
        // Optionally, you can display an error message or a placeholder image here
        const largeImageBlock = document.getElementById('large-image-block');
        if (largeImageBlock) {
            largeImageBlock.querySelector('.image-row').innerHTML = '<p>Error loading image.</p>';
        }
    }
  }

  // ====== BUTTON STATE LOGIC ======
  function checkAllButtonStates() {
    const generateBtn = document.getElementById('generateBtn');
    const refineBtn = document.getElementById('refineBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const numImagesSelect = document.getElementById('numImagesSelect');
    const promptInput = document.getElementById('promptInput');
    // Get current prompt value
    const currentPrompt = (typeof mainPromptContent === 'string' ? mainPromptContent : "").trim();
    const promptIsEmpty = !currentPrompt;
    // Check if we're in the middle of any operations
    const isProcessing = window.isRefiningNow || window.isSurprisingNow;
    // Generate button - disabled if no images selected, if prompt is empty, or if processing
    if (generateBtn) {
      generateBtn.disabled = (Number(numImagesSelect.value) === 0) || promptIsEmpty || isProcessing;
    }
    // Refine button - disabled if prompt is empty or if processing
    if (refineBtn) {
      if (refineBtn.innerText !== "Undo Refinement") {
        refineBtn.disabled = promptIsEmpty || isProcessing;
      } else {
        // Undo Refinement should only be enabled if we have a previous prompt to restore
        refineBtn.disabled = window.originalPromptBeforeRefinement === null || isProcessing;
      }
    }
    // Surprise button - disabled if processing
    if (surpriseBtn) {
      if (surpriseBtn.innerText !== "Undo Surprise") {
        surpriseBtn.disabled = isProcessing;
      } else {
        // Undo Surprise should only be enabled if we have a previous prompt to restore
        surpriseBtn.disabled = window.promptBeforeSurprise === null || isProcessing;
      }
    }
  }

  // ====== INIT ======
  document.addEventListener('DOMContentLoaded', function() {
    // Ensure prompt is empty on load
    const promptInput = document.getElementById('promptInput');
    if (promptInput) { promptInput.value = ""; }
    mainPromptContent = "";
    checkAllButtonStates();
    handleManualPromptChange(); 
    if (typeof imgSeed !== 'number' || isNaN(imgSeed)) { handleSeedInput(String(imgSeed)); }
    const masterSlider = document.getElementById('masterCreativitySlider');
    if (masterSlider && typeof masterCreativity !== 'undefined') { masterSlider.value = masterCreativity; }
    updateDerivedSettings(); 
    // No longer need to update the helper spans on DOMContentLoaded as they are not directly used by JS event handlers
  });

  // Utility: Set or restore prompt input value safely
  function setOrRestorePromptValue(value) {
    setPromptInputValue(value);
  }
 </script>
