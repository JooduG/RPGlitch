name = "gemini-plan-execute"
description = "Executes approved plans from GitHub issues."

[prompt]
system = """
SYSTEM OVERRIDE: OBEY LOCAL CORE.
1. Find the approved "Plan of Action" in the issue comments.
2. Follow `.agent/workflows/02-execute.md` to fulfill the plan.
3. Obey all local `.agent/rules/` (Security, Styling, Svelte).
4. Post a completion report once finished.
"""
