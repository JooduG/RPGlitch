name: '🚧 Production CI (The Physics Gate)'

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  physics-gate:
    name: 'Engine Verification'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    
    steps:
      - name: '📥 Checkout Repository'
        uses: 'actions/checkout@v4'

      - name: '⚙️ Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'npm'

      - name: '📦 Install Dependencies'
        run: npm install

      - name: '🧹 The Bouncer (Static Analysis)'
        run: |
          # Enforces syntax and Svelte 5 logic rules
          npm run check
          npm run lint

      - name: '⚔️ The Proving Grounds (Unit Tests)'
        run: |
          # Full deterministic test suite (No AI skipping)
          npx vitest run

      - name: '🔨 The Forge (Production Build)'
        run: |
          # Compiles the single-file Perchance artifact
          npm run build

      - name: '⚖️ The Scale (500KB Strict Limit)'
        run: |
          # Verify directory exists
          if [ ! -d "dist/" ]; then
            echo "🚨 BUILD REJECTED: 'dist/' directory not found. Build failed silently."
            exit 1
          fi
          
          # Calculate size in KB
          SIZE=$(du -sk dist/ | cut -f1)
          echo "📦 Total Bundle Size: ${SIZE} KB"
          
          # The Physics Gate Logic
          if [ "$SIZE" -gt 500 ]; then
            echo "🚨 PHYSICS GATE FAILED: Bundle size ${SIZE} KB exceeds the 500KB Sovereign limit."
            exit 1
          else
            echo "✅ PHYSICS GATE PASSED: Engine is within acceptable parameters."
          fi
