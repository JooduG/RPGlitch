name: '📋 Sovereign Scheduled Triage (Batch)'

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

env:
  # Formalizing context for the IDE linter
  GOOGLE_CLOUD_LOCATION: "${{ vars['GOOGLE_CLOUD_LOCATION'] || '' }}"
  GOOGLE_CLOUD_PROJECT: "${{ vars['GOOGLE_CLOUD_PROJECT'] || '' }}"
  SERVICE_ACCOUNT_EMAIL: "${{ vars['SERVICE_ACCOUNT_EMAIL'] || '' }}"
  GCP_WIF_PROVIDER: "${{ vars['GCP_WIF_PROVIDER'] || '' }}"
  GEMINI_CLI_VERSION: "${{ vars['GEMINI_CLI_VERSION'] || '' }}"
  GEMINI_MODEL: "${{ vars['GEMINI_MODEL'] || '' }}"
  GEMINI_DEBUG: "${{ vars['GEMINI_DEBUG'] || '' }}"
  APP_ID: "${{ vars['APP_ID'] || '' }}"

defaults:
  run:
    shell: 'bash'

jobs:
  triage:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'read'
    outputs:
      available_labels: ${{ steps.get_labels.outputs.available_labels }}
      triaged_issues: ${{ steps.gemini_issue_analysis.outputs.text }}
    steps:
      - name: 'Get repository labels'
        id: 'get_labels'
        uses: 'actions/github-script@v8.0.0'
        with:
          script: |-
            const labels = [];
            for await (const response of github.paginate.iterator(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })) {
              labels.push(...response.data);
            }
            if (!labels || labels.length === 0) {
              core.setFailed('There are no issue labels in this repository.')
            }
            const labelNames = labels.map(label => label.name).sort();
            core.setOutput('available_labels', labelNames.join(','));
            return labelNames;

      - name: 'Find untriaged issues'
        id: 'find_issues'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN || github.token }}'
        run: |-
          echo "issues_to_triage<<EOF" >> "${GITHUB_OUTPUT}"
          gh issue list --state 'open' --search 'no:label label:"status/needs-triage"' --json number,title,body --limit '100' --repo "${{ github.repository }}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: 'Run Sovereign Batch Analysis'
        id: 'gemini_issue_analysis'
        if: |-
          ${{ steps.find_issues.outputs.issues_to_triage != '[]' }}
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: '' 
          ISSUES_TO_TRIAGE: '${{ steps.find_issues.outputs.issues_to_triage }}'
          AVAILABLE_LABELS: '${{ steps.get_labels.outputs.available_labels }}'
        with:
          gcp_location: '${{ env.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ env.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ env.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ env.GCP_WIF_PROVIDER }}'
          gemini_api_key: "${{ secrets['GEMINI_API_KEY'] }}"
          gemini_cli_version: '${{ env.GEMINI_CLI_VERSION }}'
          gemini_model: '${{ env.GEMINI_MODEL }}'
          google_api_key: "${{ secrets['GOOGLE_API_KEY'] }}"
          workflow_name: 'gemini-scheduled-triage'
          settings: |-
            {
              "model": { "maxSessionTurns": 25 },
              "tools": { "core": [ "run_shell_command(echo)", "run_shell_command(jq)" ] }
            }
          # SOVEREIGN BATCH LOGIC
          prompt: |
            /gemini-scheduled-triage
            SYSTEM OVERRIDE: OBEY LOCAL CORE.
            Analyze the provided batch of untriaged issues.
            MANDATORY PROTOCOL:
            1. Categorize each issue strictly as [CORE DEBT], [BUG], or [FEATURE].
            2. Estimate effort: If total time > 30m, append the 'swarm-candidate' label.
            3. Return the JSON array of triaged issues strictly adhering to the schema expected by the workflow.

  label:
    runs-on: 'ubuntu-latest'
    needs: ['triage']
    if: |-
      ${{ needs.triage.outputs.available_labels != '' && needs.triage.outputs.triaged_issues != '[]' }}
    permissions:
      contents: 'read'
      issues: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ env.APP_ID != '' }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ env.APP_ID }}'
          private-key: "${{ secrets['APP_PRIVATE_KEY'] }}"
          permission-contents: 'read'
          permission-issues: 'write'

      - name: 'Apply Batch Labels'
        env:
          AVAILABLE_LABELS: '${{ needs.triage.outputs.available_labels }}'
          TRIAGED_ISSUES: '${{ needs.triage.outputs.triaged_issues }}'
        uses: 'actions/github-script@v8.0.0'
        with:
          github-token: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          script: |-
            const availableLabels = (process.env.AVAILABLE_LABELS || '').split(',').map(l => l.trim());
            const triagedIssues = JSON.parse(process.env.TRIAGED_ISSUES || '{}');

            for (const issue of triagedIssues) {
              if (!issue || !issue.issue_number) continue;
              let labelsToSet = (issue.labels_to_set || [])
                .map(l => l.trim())
                .filter(l => availableLabels.includes(l));
              
              if (labelsToSet.length > 0) {
                await github.rest.issues.setLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.issue_number,
                  labels: labelsToSet,
                });
              }
            }
