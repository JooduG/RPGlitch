name: "🚀 Jules Sovereign Lifecycle"

on:
  # 1. Reactive Protocol (Issues & PRs)
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, labeled]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

  # 2. Strategic Triggers (Schedules)
  schedule:
    - cron: "0 4 * * *" # 4 AM: Security & Hygiene (The Night Shift)

  # 3. Operational Triggers (Manual)
  workflow_dispatch:

  # 4. Physics Gate (Push to Core)
  push:
    branches: ["main", "develop"]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}"
  cancel-in-progress: true

jobs:
  # --- JOB A: PHYSICS GATE (CI) ---
  # Runs on every push/PR to ensure engine integrity.
  physics-gate:
    name: "🧪 Physics Gate"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - name: "Sovereign Audit & Build"
        run: npm run deploy:prepare

  # --- JOB B: JULES REACTIVE AGENT ---
  # Handles issues, PR comments, and reactive tasks.
  jules-reactive:
    name: "🛸 Reactive Agent"
    needs: [physics-gate]
    if: |-
      github.event.sender.type == 'User' &&
      github.event.sender.login != 'google-labs-jules[bot]' &&
      github.event.sender.login != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[bot-auto]') &&
      !contains(github.event.head_commit.message, 'chore(sovereign)') &&
      !github.event.pull_request.head.repo.fork &&
      (
        github.event.label.name == 'jules:run' ||
        contains(github.event.issue.body, '@jules') ||
        contains(github.event.pull_request.body, '@jules') ||
        contains(github.event.comment.body, '@jules') ||
        contains(github.event.review.body, '@jules')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: "google-labs-code/jules-action@main"
        with:
          jules_api_key: "${{ secrets.JULES_API_KEY }}"
          prompt: "Analyze the current context and take appropriate action. Respect Rule 05 & 06."
          include_last_commit: true
          include_commit_log: true
      - name: "📦 Relocate Artifacts"
        if: always()
        run: |
          mkdir -p tmp
          [ -f prompt.txt ] && mv prompt.txt tmp/ || true
          [ -f jules_payload.json ] && mv jules_payload.json tmp/ || true

  # --- JOB B2: SWARM ORCHESTRATOR ---
  # Handles parallel agent dispatch via @google/jules
  jules-swarm:
    name: "🐝 Swarm Commander"
    needs: [physics-gate]
    if: |-
      github.event.sender.type == 'User' &&
      !github.event.pull_request.head.repo.fork &&
      (
        github.event.label.name == 'jules:swarm' ||
        contains(github.event.issue.body, '@jules swarm') ||
        contains(github.event.pull_request.body, '@jules swarm') ||
        contains(github.event.comment.body, '@jules swarm')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - name: "🚀 Dispatch Jules Swarm"
        # In a real environment, you might use a custom action or script here
        # that orchestrates the swarm using jules-sdk.
        run: |
          echo "Initiating parallel jules-sdk dispatch..."
          npm run swarm:dispatch --if-present || echo "swarm:dispatch script not found. You must configure jules-sdk locally."
        env:
          JULES_API_KEY: "${{ secrets.JULES_API_KEY }}"

  # --- JOB C: STRATEGIC OPERATIONS ---
  # Handles scheduled hygiene.
  strategic-ops:
    name: "🧠 Strategic Ops"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --legacy-peer-deps

      # NIGHTLY HYGIENE (4 AM)
      - name: "🌙 The Night Shift"
        if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        uses: "google-labs-code/jules-action@main"
        with:
          jules_api_key: "${{ secrets.JULES_API_KEY }}"
          prompt: "Execute compliance checks from GEMINI.md (Compliance section / Rule 06). Target Critical/High vulnerabilities."
      - name: "📦 Relocate Artifacts"
        if: always()
        run: |
          mkdir -p tmp
          [ -f prompt.txt ] && mv prompt.txt tmp/ || true
          [ -f jules_payload.json ] && mv jules_payload.json tmp/ || true

      - name: "💾 Commit Hygiene"
        if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        uses: "stefanzweifel/git-auto-commit-action@v5"
        with:
          commit_message: "chore(sovereign): nightly hygiene [bot-auto]"
