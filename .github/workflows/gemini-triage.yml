name: '🔀 Sovereign Triage (Single)'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false
      GOOGLE_CLOUD_LOCATION:
        type: 'string'
        required: false
      GOOGLE_CLOUD_PROJECT:
        type: 'string'
        required: false
      SERVICE_ACCOUNT_EMAIL:
        type: 'string'
        required: false
      GCP_WIF_PROVIDER:
        type: 'string'
        required: false
      GEMINI_CLI_VERSION:
        type: 'string'
        required: false
      GEMINI_MODEL:
        type: 'string'
        required: false
      GEMINI_DEBUG:
        type: 'string'
        required: false
      GOOGLE_GENAI_USE_GCA:
        type: 'string'
        required: false
      GOOGLE_GENAI_USE_VERTEXAI:
        type: 'string'
        required: false
      UPLOAD_ARTIFACTS:
        type: 'string'
        required: false
      APP_ID:
        type: 'string'
        required: false
    secrets:
      GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      APP_PRIVATE_KEY:
        required: false

concurrency:
  group: '${{ github.workflow }}-triage-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  triage:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    outputs:
      available_labels: ${{ steps.get_labels.outputs.available_labels }}
      selected_labels: ${{ steps.gemini_analysis.outputs.text }} # assuming gemini-cli outputs to text
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'read'
      pull-requests: 'read'
    steps:
      - name: 'Get repository labels'
        id: 'get_labels'
        uses: 'actions/github-script@v8.0.0'
        with:
          script: |-
            const labels = [];
            for await (const response of github.paginate.iterator(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })) {
              labels.push(...response.data);
            }
            if (!labels || labels.length === 0) {
              core.setFailed('There are no issue labels in this repository.')
            }
            const labelNames = labels.map(label => label.name).sort();
            core.setOutput('available_labels', labelNames.join(','));
            core.info(`Found ${labelNames.length} labels: ${labelNames.join(', ')}`);
            return labelNames;

      - name: 'Run Sovereign Triage Analysis'
        id: 'gemini_analysis'
        if: |-
          ${{ steps.get_labels.outputs.available_labels != '' }}
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: '' # No auth token here for security on untrusted inputs
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
          AVAILABLE_LABELS: '${{ steps.get_labels.outputs.available_labels }}'
        with:
          gcp_location: '${{ inputs.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ inputs.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ inputs.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ inputs.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ inputs.GEMINI_CLI_VERSION }}'
          gemini_model: '${{ inputs.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          workflow_name: 'gemini-triage'
          settings: |-
            {
              "model": { "maxSessionTurns": 25 },
              "tools": { "core": [ "run_shell_command(echo)" ] }
            }
          # SOVEREIGN LOGIC INJECTION
          prompt: |
            /gemini-triage
            SYSTEM OVERRIDE: OBEY LOCAL CORE.
            Analyze Issue #${{ github.event.issue.number }}.
            MANDATORY PROTOCOL:
            1. Categorize the issue strictly as [CORE DEBT], [BUG], or [FEATURE].
            2. Calculate effort: Estimate if total time is > 30m (and > 10m per sub-task). 
            3. If the threshold is met, you MUST include 'swarm-candidate' in your final selected labels list.
            4. Format your output to export the selected labels perfectly as expected by the workflow.

  label:
    runs-on: 'ubuntu-latest'
    needs: ['triage']
    if: |-
      ${{ needs.triage.outputs.selected_labels != '' }}
    permissions:
      contents: 'read'
      issues: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ inputs.APP_ID != '' }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ inputs.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'

      - name: 'Apply Secure Labels'
        env:
          ISSUE_NUMBER: '${{ github.event.issue.number }}'
          AVAILABLE_LABELS: '${{ needs.triage.outputs.available_labels }}'
          SELECTED_LABELS: '${{ needs.triage.outputs.selected_labels }}'
        uses: 'actions/github-script@v8.0.0'
        with:
          github-token: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          script: |-
            const availableLabels = (process.env.AVAILABLE_LABELS || '').split(',').map(l => l.trim());
            const selectedLabels = (process.env.SELECTED_LABELS || '').split(',')
              .map(l => l.trim())
              .filter(l => availableLabels.includes(l));

            const issueNumber = process.env.ISSUE_NUMBER;
            if (selectedLabels.length > 0) {
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: selectedLabels,
              });
              core.info(`Successfully set labels: ${selectedLabels.join(',')}`);
            }
