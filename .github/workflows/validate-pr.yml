# .github/workflows/validate-pr.yml
name: Validate PR body
on:
  pull_request:
    types: [opened, edited, synchronize]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const mustHave = [
              "## Strategy", "## Tactics", "## Operations", "## Checklist"
            ];
            const requiredChecks = [
              /- \[x\] I have read and followed the guidelines in `AGENTS\.md`\./i,
              /- \[x\] My changes adhere to the project's coding and architectural standards\./i,
              /- \[x\] I have verified that all automated validation checks \(`validate-pr\.yml`\) pass\./i
            ];
            const failures = requiredChecks.filter(rx => !rx.test(body));
            if (failures.length) {
              core.setFailed("Please complete the checklist in the PR body.");
            }
            const missing = mustHave.filter(h => !body.includes(h));
            if (missing.length) {
              core.setFailed(`PR is missing sections: ${missing.join(", ")}`);
            }
