name: The Night Shift (v4.0)
on:
  schedule:
    - cron: "0 4 * * *" # Wakes up at 4:00 AM every day
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab
jobs:
  janitorial-duties:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for git-auto-commit-action
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for memory script or git diffs
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install Dependencies
        run: npm install
      - name: 🧹 The Bouncer (Format & Audit)
        run: |
          # Runs standard Svelte checks and custom style audits
          npm run check || true
          node .agent/skills/css/scripts/audit-css.js || true
      - name: 🧠 The RAG-Sweeper (Pinecone Memory Sync)
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          # Syncs current codebase state to Pinecone memory
          node .agent/skills/data/scripts/index.js upsert || echo "Memory sync skipped/failed."
      - name: 📋 The Secretary (Janitor & Backlog)
        run: |
          # Extracts #TODO-AI tags and updates the session backlog
          node .agent/skills/warden/scripts/janitor.js
      - name: 💾 Commit & Pass the Baton
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(night-shift): sync project data, memory, and audit reports"
          commit_author: "Antigravity Janitor <actions@github.com>"
          file_pattern: "src/**/*.svelte src/**/*.js src/**/*.css .agent/project-management/*.md"
