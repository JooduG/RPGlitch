name: Sovereign Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Sovereign Triage
        id: triage
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use CLI to triage the incoming issue
          node .agent/skills/gli/scripts/gli.js triage --agent
          
          # Automated UI Action: Label Issue
          gh issue edit ${{ github.event.issue.number }} --add-label 'sovereign-triage'
          
          # Automated Comment
          gh issue comment ${{ github.event.issue.number }} --body "### 🧩 Sovereign Triage: ACK
          - Categorized as: **CORE DEBT**.
          - Priority: **P1**.
          - Identified Area: **Infrastructure**."
