<body>

  <!-- Hidden for accessibility/SEO -->
  <a href="#main" hidden="hidden">Skip to main content</a>

  <!-- Initial Loading -->
  <dialog id="loading-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev"></button>
      </header>
      <span aria-busy="true"><h2>Loading...</h2></span>
    </article>
  </dialog>

  <!-- Error Emergency -->
  <dialog id="emergency-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev"></button>
      </header>
      <h2>Error during load?</h2>
      <footer>
        <button id="emergency-export" class="danger" data-action="export-all">Save All Data &#128190;</button>
        <button id="emergency-delete" class="danger" data-action="delete-all">Delete All Data &#128680;</button>
      </footer>
    </article>
  </dialog>

  <header class="container">
    
      <!-- Top Bar -->
      <nav id="top-bar" class="top-bar">

        <!-- Top Bar Left -->
        <div id="top-bar-left" role="tablist">
          <ul role="presentation">
            <li role="presentation"><button class="secondary" role="tab" tabindex="0" id="tab-stories" aria-selected="false" aria-expanded="false" aria-controls="chin-stories" data-chin="stories">Stories</button></li>
            <li role="presentation"><button class="secondary" role="tab" tabindex="-1" id="tab-characters" aria-selected="false" aria-expanded="false" aria-controls="chin-characters" data-chin="characters">Characters</button></li>
            <li role="presentation"><button class="secondary" role="tab" tabindex="-1" id="tab-worlds" aria-selected="false" aria-expanded="false" aria-controls="chin-worlds" data-chin="worlds">Worlds</button></li>
            <li role="presentation"><button class="secondary" role="tab" tabindex="-1" id="tab-options" aria-selected="false" aria-expanded="false" aria-controls="chin-options" data-chin="options">Options</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Storyboard -->
        <div id="top-bar-right-storyboard">
          <ul>
            <li><button class="secondary" id="shuffle-btn">Shuffle</button></li>
            <li><button class="primary" id="begin-story">Begin Story</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Form -->
        <div id="top-bar-right-form" hidden="hidden">
          <ul>
            <li><button class="secondary" id="form-cancel">Cancel</button></li>
            <li><button class="danger" id="form-delete">Delete</button></li>
            <li><button class="primary" id="form-save">Save</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Profile -->
        <div id="top-bar-right-profile" hidden="hidden">
          <ul>
            <li><button class="secondary" id="profile-edit">Edit</button></li>
            <li><button class="secondary" id="profile-copy">Copy & Customise</button></li>
            <li><button class="primary" id="profile-back">Back</button></li>
          </ul>
        </div>
      </nav>

  </header>
  
  <!-- Chin Container -->
  <div id="chin-container" class="container" hidden="hidden">

    <!-- Stories Chin -->
    <div role="tabpanel" tabindex="0" id="chin-stories" aria-labelledby="tab-stories" data-chin="stories" class="chin" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-stories-input" name="search" placeholder="Search Stories" aria-label="Search Stories" />
              <button class="secondary">Search</button>
            </fieldset>
          </form>
        </div>

        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-story">
            Upload Story
          </button>
            <input type="file" id="upload-story" aria-label="Upload Story" class="file-input" hidden="hidden"/>
          <button id="new-story" class="secondary">New Story</button>
        </div>
      </div>
      <div id="chin-story-grid" class="chin-grid"><!-- Story Cards --></div>
    </div>
  
    <!-- Chin: Character -->
    <div role="tabpanel" tabindex="0" id="chin-characters" aria-labelledby="tab-characters" data-chin="characters" class="chin" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-characters-input" name="search" placeholder="Search Characters" aria-label="Search Characters" />
              <button class="secondary">Search</button>
            </fieldset>
          </form>
        </div>

        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-character">
            Upload Character
          </button>
            <input type="file" id="upload-character" aria-label="Upload Character" hidden="hidden"/>
          <button id="new-character" class="secondary">New Character</button>
        </div>
      </div>

      <div id="chin-character-grid" class="chin-grid"><!-- Character Cards --></div>
    </div>
  
    <!-- Chin: World -->
    <div role="tabpanel" tabindex="0" id="chin-worlds" aria-labelledby="tab-worlds" data-chin="worlds" class="chin" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-worlds-input" name="search" placeholder="Search Worlds" aria-label="Search Worlds" />
              <button class="secondary">Search</button>
            </fieldset>
          </form>
        </div>
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-world">
            Upload World
          </button>
            <input type="file" id="upload-world" aria-label="Upload World" hidden="hidden"/>
          <button id="new-world" class="secondary">New World</button>
        </div>
      </div>
      <div id="chin-world-grid" class="chin-grid"><!-- World Cards --></div>
    </div>
  
    <!-- Chin: Options -->
    <div role="tabpanel" tabindex="0" id="chin-options" aria-labelledby="tab-options" data-chin="options" class="chin" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
        <!-- Something in the future? -->
        </div>
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-backup">
            Upload All
          </button>
          <input type="file" id="upload-backup" aria-label="Upload Backup" hidden="hidden"/>
          <button id="download-backup" class="secondary">Download Backup</button>
          <button id="delete-all-data" class="danger">Delete All Data</button>
        </div>
      </div>
      <div class="chin-options-fields">
        <textarea id="opening-prompt" placeholder="Story Prompt"></textarea>
        <textarea id="custom-js" placeholder="Custom JS"></textarea>
      </div>
    </div>
  </div>
  
  
  <!-- Main Container -->
  <main id="main" class="container-fluid">
    
    <!-- Storyboard Screen -->
    <div id="storyboard-screen">

      <div id="storyboard-dynamic-title-wrapper">
        <h2 id="storyboard-dynamic-title">Storyboard</h2>
      </div>
      
        <div id="storyboard-grid">
            <div class="storyboard-card" id="storyboard-card-ai" data-type="character">
                <div class="storyboard-card-left">
                </div>

                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-ai-select" class="storyboard-card-title" aria-label="Choose AI Character" data-placeholder="Select AI Character…"><option value="">Select AI Character…</option></select>
                  </header>
                    Select an AI character for your story...
                  <footer>
                    <small>Täg</small> 
                  </footer>
                </article>
            </div>

            <div class="storyboard-card" id="storyboard-card-user" data-type="character">
                <div class="storyboard-card-left">
                </div>
                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-user-select" class="storyboard-card-title" aria-label="Choose User Character" data-placeholder="Select Your Character…"><option value="">Select Your Character…</option></select>
                  </header>
                    Select your character for the story...
                  <footer>
                    <small><!-- Premade Tag --></small> 
                  </footer>
                </article>
            </div>

            <div class="storyboard-card" id="storyboard-card-world" data-type="world">
                <div class="storyboard-card-left">
                </div>
                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-world-select" class="storyboard-card-title" aria-label="Choose World" data-placeholder="Select World…"><option value="">Select World…</option></select>
                  </header>
                    Select a world for your story...
                  <footer>
                    <small><!-- Premade Tag --></small> 
                  </footer>
                </article>
            </div>
          </div>
      </div>

    <!-- Chat Screen -->
    <div id="chat-screen-container" hidden="hidden" >
      <div id="chat-screen">

        <!-- Character Display Areas -->
        <div id="user-character-display"></div>
        <div id="ai-character-display"></div>
        
        <!-- Chat Wrapper -->
        <div id="chat-wrapper">
          <!-- Chat Feed -->
          <div id="chat-feed"></div>
          
          <!-- Status Elements -->
          <div id="story-concluded">Story concluded</div>
          <div id="no-messages">No messages yet</div>
          <div id="status-notifier"></div>
          <div id="typing-indicator"></div>
          <button id="conclude-story">Conclude Story</button>
        </div>
      </div>

          <!-- Input Area -->
          <footer>
            <form>
              <fieldset role="group">
                <input type="text" name="message" placeholder="Type your message..." aria-label="Message" />
                <input type="submit" value="Send" />
              </fieldset>
            </form>
          </footer>
        </div>

    <!-- Profile Screen -->
    <div id="profile-screen" hidden="hidden" >
      <!-- Profile content will be dynamically generated -->
    </div>

    <!-- Character Form Screen -->
    <div id="character-form-screen" hidden="hidden" >
      <!-- Character form content will be dynamically generated -->
    </div>

    <!-- World Form Screen -->
    <div id="world-form-screen" hidden="hidden" >
      <!-- World form content will be dynamically generated -->
    </div>

    <!-- Premade Character Bank -->
    <div id="premade-character-bank" hidden="hidden" >
      <div id="premade-character-list"></div>
    </div>

    <!-- Premade World Bank -->
    <div id="premade-world-bank" hidden="hidden" >
      <div id="premade-world-list"></div>
    </div>

    <!-- Memory Application Screen -->
    <div id="memory-application-screen" hidden="hidden" >
      <!-- Memory application content will be dynamically generated -->
    </div>

/**
 * Hides a DOM element by adding the hidden attribute.
 * @param {HTMLElement|string} el - The element or its ID.
 * @returns {HTMLElement|null}
 */

function hideEl(el) {
  if (typeof el === 'string') el = document.getElementById(el);
  if (!el) return null;
  el.setAttribute('hidden', 'hidden');
  return el;
}

/**
 * Reveals a DOM element by removing the hidden attribute.
 * @param {HTMLElement|string} el - The element or its ID.
 * @returns {HTMLElement|null}
 */

function showEl(el) {
  if (typeof el === 'string') el = document.getElementById(el);
  if (!el) return null;
  el.removeAttribute('hidden');
  return el;
}

window.hideEl = hideEl;
window.showEl = showEl;

(function (global) {
  const App = global.App || (global.App = {});
  const doc = global.document;
  const storeMap = { character: 'characters', world: 'worlds' };
  const STORAGE_VERSION = 1;

  function getDeterministicColor(seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
      hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 40%, 60%)`;
  }

  const PLACEHOLDER_ICONS = {
    character:
      '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-3.33 0-8 1.67-8 5v3h16v-3c0-3.33-4.67-5-8-5z"/></svg>',
    world:
      '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 010-16 8 8 0 010 16zm0-14a6 6 0 00-5.29 3h10.58A6 6 0 0012 6zm-5.29 5a6 6 0 000 2h10.58a6 6 0 000-2H6.71zm.42 3a6 6 0 005.29 3 6 6 0 005.29-3H7.13z"/></svg>',
    default:
      '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'
  };

  function getPictureHTML(entity = {}, options = {}) {
    const { cover } = options;
    const title = entity.title || entity.name || 'Empty';
    const kind = entity.kind || 'default';
    const src = typeof entity.imageUrl === 'string' && entity.imageUrl.trim() ? entity.imageUrl.trim() : null;

    if (src) {
      const img = doc.createElement('img');
      img.className = 'entity-image';
      if (cover) img.style.objectFit = 'cover';
      img.src = src;
      img.alt = `${kind} image for ${title}`;
      return img;
    }

    const div = doc.createElement('div');
    div.className = 'placeholder-image';
    div.style.backgroundColor = getDeterministicColor((entity.id || kind).toString());
    div.innerHTML = PLACEHOLDER_ICONS[kind] || PLACEHOLDER_ICONS.default;
    div.setAttribute('role', 'img');
    div.setAttribute('aria-label', `${kind} placeholder for ${title}`);
    return div;
  }

  global.getPictureHTML = getPictureHTML;

  function read(type) {
    const key = storeMap[type];
    try {
      const raw = global.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function write(type, items) {
    const key = storeMap[type];
    global.localStorage.setItem(key, JSON.stringify(items));
  }

  function normalize(core, base = {}) {
    const nameOrTitle = core.name || core.title || base.name || base.title || '';
    const summaryOrDesc = core.summary || core.description || base.summary || base.description || '';
    const sections = core.sections || base.sections || {};
    const imageUrl = core.imageUrl || core.image || base.imageUrl || base.image || '';
    const image = imageUrl;
    return {
      name: nameOrTitle,
      title: nameOrTitle,
      summary: summaryOrDesc,
      description: summaryOrDesc,
      tags: core.tags || base.tags || [],
      sections: {
        forever: sections.forever || '',
        past: sections.past || '',
        present: sections.present || '',
        future: sections.future || ''
      },
      image,
      imageUrl
    };
  }

  function merge(type, custom) {
    const key = storeMap[type];
    const premade = (App.getPremadeItems ? App.getPremadeItems(key) : []).map((e) => ({
      ...e,
      kind: type,
      isPremade: true,
      isCustom: false,
      version: STORAGE_VERSION,
      ...normalize(e)
    }));
    const normal = custom.map((e) => ({
      ...e,
      kind: type,
      isPremade: false,
      isCustom: true,
      version: STORAGE_VERSION,
      ...normalize(e)
    }));
    return premade.concat(normal);
  }

  function _writeAndCache(type, items) {
    write(type, items);
    const key = storeMap[type];
    App._allItemsCache = App._allItemsCache || Object.create(null);
    App._allItemsCache[key] = merge(type, items);

    list(type) {

      const key = storeMap[type];
      if (Array.isArray(App._allItemsCache[key])) return App._allItemsCache[key];
      const data = merge(type, read(type));

    get(type, id) {

    },
    upsert(type, entity) {

        id,
        kind: type,
        isCustom: true,
        isPremade: false,
        version: STORAGE_VERSION,
        ...base,
        ...normalize(entity, base)
      };
      if (idx >= 0) items[idx] = saved;
      else items.push(saved);
      _writeAndCache(type, items);
      return saved;

    update(type, id, entity) {

      const idx = items.findIndex((e) => e.id === id);
      if (idx < 0) return null;
      const base = items[idx];

        ...base,
        ...normalize(entity, base)
      };

      _writeAndCache(type, items);
      return saved;

    remove(type, id) {
      const remaining = read(type).filter((e) => e.id !== id);
      _writeAndCache(type, remaining);
    },
    copy(type, id) {
      const item = this.get(type, id);
      if (!item) return null;
      return { ...item, sections: { ...item.sections } };
    }
  };

(function (global) {
  const App = global.App || (global.App = {});
  const doc = global.document;
  const SECTIONS_CONFIG = [
    ['Forever', 'forever'],
    ['Past', 'past'],
    ['Present', 'present'],
    ['Future', 'future']
  ];

  function goBackWithFallback(target = '#storyboard', timeoutMs = 250) {
    const before = global.location.hash;
    if (global.history.length > 1) {
      global.history.back();
      global.setTimeout(() => {
        if (global.location.hash === before) App.router.navigate(target);
      }, timeoutMs);
    } else {
      App.router.navigate(target);
    }
  }

  function renderTags(container, tags) {
    if (!tags || !tags.length) return;
    const wrap = doc.createElement('div');
    wrap.className = 'tag-chips';
    tags.forEach((t) => {
      const chip = doc.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = t;
      wrap.appendChild(chip);
    });
    container.appendChild(wrap);
  }

  function buildHero(entity) {
    const wrap = doc.createElement('div');
    wrap.className = 'hero-wrap';
    const pic = global.getPictureHTML ? global.getPictureHTML(entity, { cover: true }) : null;
    if (pic) {
      pic.classList?.add('hero-bleed');
      wrap.appendChild(pic);
    }
    renderTags(wrap, entity.tags || []);
    return wrap;
  }

  function renderProfile(type, id) {
    const sb = doc.getElementById('storyboard-screen');
    if (sb) App.hideEl(sb);
    const entity = App.entities.get(type, id);
    if (!entity) {
      App.router?.navigate('#');
      return;
    }
    const screen = doc.getElementById('profile-screen');
    if (!screen) return;
    screen.textContent = '';
    screen.appendChild(buildHero(entity));
    const content = doc.createElement('div');
    const h1 = doc.createElement('h1');
    h1.textContent = entity.name || entity.title || 'Empty';
    content.appendChild(h1);
    if (entity.summary) {
      const p = doc.createElement('p');
      p.textContent = entity.summary;
      content.appendChild(p);
    }
    const sections = entity.sections || {};
    SECTIONS_CONFIG.forEach(([label, key]) => {
      if (!sections[key]) return;
      const field = doc.createElement('div');
      field.className = 'profile-field';
      const l = doc.createElement('div');
      l.className = 'profile-field-label';
      l.textContent = label;
      const body = doc.createElement('div');
      body.textContent = sections[key];
      field.append(l, body);
      content.appendChild(field);
    });
    screen.appendChild(content);
    App.hideEl('chin-container');
    App.hideEl('character-form-screen');
    App.hideEl('world-form-screen');
    screen.dataset.entityId = entity.id || '';
    App.showEl(screen);
    const backBtn = doc.getElementById('profile-back');
    const editBtn = doc.getElementById('profile-edit');
    const copyBtn = doc.getElementById('profile-copy');
    if (editBtn) editBtn.hidden = true;
    if (copyBtn) copyBtn.hidden = true;
    if (copyBtn) copyBtn.hidden = !entity.isPremade;
    if (editBtn) editBtn.hidden = entity.isPremade;
    if (backBtn) backBtn.onclick = goBackWithFallback;
    editBtn?.addEventListener('click', () => App.router.navigate(`#form/${type}/${entity.id}`));
    copyBtn?.addEventListener('click', () => {
      const from = entity.id;
      App.router.navigate(`#form/${entity.kind}/new?from=${from}`);
    });
  }

  function createField(id, labelText, inputEl) {
    const field = doc.createElement('div');
    field.className = 'profile-field';
    const label = doc.createElement('label');
    label.className = 'profile-field-label';
    label.setAttribute('for', id);
    label.textContent = labelText;
    inputEl.id = id;
    field.append(label, inputEl);
    return field;
  }

  function renderForm(type, id) {
    const sb = doc.getElementById('storyboard-screen');
    if (sb) App.hideEl(sb);
    const isEdit = id && id !== 'new';
    const params = new URLSearchParams(global.location.hash.split('?')[1] || '');
    const from = params.get('from');
    const template = !isEdit && from ? App.entities.copy(type, from) : null;
    const existing = isEdit ? App.entities.get(type, id) : template;
    const screenId = type === 'character' ? 'character-form-screen' : 'world-form-screen';
    const screen = doc.getElementById(screenId);
    if (!screen) return;
    const entity = { ...(existing || {}), kind: type };
    screen.textContent = '';
    const heroWrap = buildHero(entity);
    // (no heroEl variable)
    screen.appendChild(heroWrap);
    const content = doc.createElement('div');
    const h1 = doc.createElement('h1');
    h1.textContent = isEdit ? `Editing ${type.charAt(0).toUpperCase() + type.slice(1)}` : `New ${type.charAt(0).toUpperCase() + type.slice(1)}`;
    content.appendChild(h1);
    const form = doc.createElement('form');
    const titleInput = doc.createElement('input');
    titleInput.name = 'name';
    titleInput.required = true;
    titleInput.value = entity.name || '';
    form.appendChild(createField('name', 'Title', titleInput));
    const summaryInput = doc.createElement('input');
    summaryInput.name = 'summary';
    summaryInput.value = entity.summary || '';
    form.appendChild(createField('summary', 'Summary', summaryInput));
    const imageInput = doc.createElement('input');
    imageInput.name = 'imageUrl';
    imageInput.type = 'url';
    imageInput.value = entity.imageUrl || '';
    imageInput.addEventListener('change', () => {
      const val = imageInput.value.trim();
    const newEl = global.getPictureHTML
    ? global.getPictureHTML({ ...entity, imageUrl: val, image: val }, { cover: true })
    : null;
  if (newEl) {
    const currentHeroEl = heroWrap.querySelector('.entity-image, .placeholder-image');
  if (currentHeroEl) {
      currentHeroEl.replaceWith(newEl);
    } else {
      heroWrap.appendChild(newEl);
    }
    }
    });
    form.appendChild(createField('imageUrl', 'Image URL', imageInput));
    const tagsInput = doc.createElement('input');
    tagsInput.name = 'tags';
    tagsInput.value = (entity.tags || []).join(', ');
    form.appendChild(createField('tags', 'Tags', tagsInput));
    SECTIONS_CONFIG.forEach(([label, key]) => {
      const textarea = doc.createElement('textarea');
      textarea.name = key;
      textarea.value = entity.sections?.[key] || '';
      form.appendChild(createField(key, label, textarea));
    });
    content.appendChild(form);
    screen.appendChild(content);
    App.hideEl('chin-container');
    App.hideEl('profile-screen');
    App.hideEl(type === 'character' ? 'world-form-screen' : 'character-form-screen');
    App.showEl(screen);
    const saveBtn = doc.getElementById('form-save');
    const cancelBtn = doc.getElementById('form-cancel');
    const deleteBtn = doc.getElementById('form-delete');
    const suppressDelete = id && global.sessionStorage?.getItem('rpglitch-no-delete') === id;
    if (suppressDelete) global.sessionStorage.removeItem('rpglitch-no-delete');
    if (deleteBtn) deleteBtn.hidden = !(isEdit && entity.isCustom && !suppressDelete);
    if (cancelBtn) cancelBtn.onclick = goBackWithFallback;
    saveBtn?.addEventListener('click', () => {
      const data = {
        kind: type,
        name: titleInput.value.trim(),
        summary: summaryInput.value.trim(),
        imageUrl: imageInput.value.trim(),
        image: imageInput.value.trim(),
        tags: tagsInput.value.split(',').map((t) => t.trim()).filter(Boolean),
        sections: {
          forever: form.elements.forever.value.trim(),
          past: form.elements.past.value.trim(),
          present: form.elements.present.value.trim(),
          future: form.elements.future.value.trim()
        },
        isCustom: true,
        isPremade: false
      };
      if (!data.name) return;
      if (isEdit) data.id = entity.id;
      const saved = App.entities.upsert(type, data);
      App.refreshAllLists?.();
      if (saved) App.router.navigate(`#profile/${type}/${saved.id}`);
    });
    if (deleteBtn) deleteBtn.onclick = () => {
      if (isEdit && confirm('Delete this item?')) {
        App.entities.remove(type, entity.id);
        App.refreshAllLists?.();
        App.router.navigate('#storyboard');
      }
    };
  }

  App.renderProfile = renderProfile;
  App.renderForm = renderForm;
})(typeof window !== 'undefined' ? window : globalThis);


/* profile-router.js */
(function (global) {
  const App = global.App || (global.App = {});

  function showStoryboard() {
    App.showEl('storyboard-screen');
    App.showEl('chin-container');
    App.hideEl('profile-screen');
    App.hideEl('character-form-screen');
    App.hideEl('world-form-screen');
  }

  function parseHash() {
    return global.location.hash.slice(1).split('/').filter(Boolean);
  }

  function handleRoute() {
    const [section, type, id] = parseHash();
    const isType = (t) => t === 'character' || t === 'world';
    if (section === 'profile' && isType(type) && id) {
      App.setTopBarRight('profile');
      App.hideEl('storyboard-screen');
      App.hideEl('character-form-screen');
      App.hideEl('world-form-screen');
      App.renderProfile?.(type, id);
    } else if (section === 'form' && isType(type)) {
      App.setTopBarRight('form');
      App.hideEl('storyboard-screen');
      App.hideEl('profile-screen');
      App.renderForm?.(type, id || 'new');
    } else {
      App.setTopBarRight('storyboard');
      showStoryboard();
    }
  }

  App.updateStoryboardCard = function (selectEl, collection) {
    const doc = global.document;
    const select = typeof selectEl === 'string' ? doc.getElementById(selectEl) : selectEl;
    if (!select) return;
    const card = select.closest('.storyboard-card');
    if (!card) return;
    const type = collection.slice(0, -1);
    const id = select.value;
    const entity = id ? App.entities.get(type, id) : null;
    if (entity) {
      const unified = entity.imageUrl || entity.image || '';
      entity.image = unified;
      entity.imageUrl = unified;
    }
    card.classList.toggle('empty-card', !entity);
    const group = card.querySelector('.storyboard-card-buttons');
    if (group) {
      group.querySelectorAll('button').forEach((btn) => btn.classList.remove('selected'));
      if (id) group.querySelector(`[data-id="${id}"]`)?.classList.add('selected');
    }
    const left = card.querySelector('.storyboard-card-left');
    if (left) {

  ui.topBarButtons.forEach((b) => {

  const ui = App._getUIElements();
  const container = ui.chinContainer;
  if (!container) return;
  const target = container.querySelector(`[data-chin="${chin}"]`);
  const wasHidden = !target || target.hasAttribute('hidden');
  const panels = container.querySelectorAll('.chin');
  panels.forEach((panel) => App.hideEl(panel));
  if (!target) return;

  if (!wasHidden) {

function loadStoredItems(key) {
  try {
    const storage = global.localStorage;
    if (!storage) return [];
    const data = storage.getItem(key);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.error(`Failed to parse localStorage item with key "${key}":`, e);
    return [];
  }
}

function addItem(key, item) {
  const current = loadStoredItems(key);
  current.push(item);
  global.localStorage.setItem(key, JSON.stringify(current));
}

App.getAllItems = App.getAllItems || function (key, refresh = false) {
  App._allItemsCache = App._allItemsCache || Object.create(null);
  if (!refresh && Array.isArray(App._allItemsCache[key])) return App._allItemsCache[key];

  if ((key === 'characters' || key === 'worlds') && App.entities && typeof App.entities.list === 'function') {
    if (refresh) {
      // The cache is shared, so we need to clear the specific key to force a refresh.
      delete App._allItemsCache[key];

    const items = App.entities.list(key.slice(0, -1));

  const premade = App.getPremadeItems(key).map((item) => ({ ...item, isPremade: true }));
  const stored = loadStoredItems(key).map((item) => ({ ...item, isPremade: false }));

function renderList(containerId, key) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('img.entity-image[src^="blob:"]').forEach((img) => {

  });
  container.textContent = '';
  const all = App.getAllItems(key);
  if (key === 'stories' && all.length === 0) {
    const message = document.createElement('p');
    message.className = 'chin-empty';
    message.textContent = 'Empty here—time to write your first story!';
    container.appendChild(message);
    return;
  }
  all.forEach((item) => {
    const card = document.createElement('div');
    card.className = 'chin-card';
    card.dataset.title = item.title || item.name || 'Empty';
    if (item.id) {
      card.dataset.id = item.id;
      card.dataset.type = key.slice(0, -1);
      card.dataset.entityId = item.id;
      card.dataset.entityType = key.slice(0, -1);
    }
    if (item.isPremade) card.dataset.premade = 'true';

    const media = document.createElement('div');
    media.className = 'media';

    if (typeof global.getPictureHTML === 'function') {
      const pic = global.getPictureHTML(item, { cover: true });
      media.appendChild(pic);
      pic.classList.toggle('empty', pic.classList.contains('placeholder-image'));
    }

    const title = document.createElement('h4');
    title.className = 'title';
    title.textContent = item.title || item.name || 'Empty';
    media.appendChild(title);

    if (item.isPremade) {
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = 'Premade';
      media.appendChild(badge);
    }

    const body = document.createElement('div');
    body.className = 'body';

    if (item.description) {
      const desc = document.createElement('p');
      desc.className = 'description';
      desc.textContent = item.description;
      body.appendChild(desc);
    }

    card.appendChild(media);
    card.appendChild(body);
    container.appendChild(card);
  });
}

function renderDropdown(selectId, key) {
  const select = document.getElementById(selectId);
  if (!select) return;
  const existingPlaceholder = select.querySelector('option[value=""]');
  const placeholderText = existingPlaceholder
    ? existingPlaceholder.textContent
    : select.dataset.placeholder || '';
  select.dataset.placeholder = placeholderText;
  const placeholder = existingPlaceholder
    ? existingPlaceholder.cloneNode(true)
    : document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = placeholderText;
  select.textContent = '';
  select.appendChild(placeholder);
  const items = App.getAllItems(key);
  const premadeGroup = document.createElement('optgroup');
  premadeGroup.label = 'Premade';
  const customGroup = document.createElement('optgroup');
  customGroup.label = 'Custom';
  let premadeCount = 0;
  let customCount = 0;
  items.forEach((item) => {
    const option = document.createElement('option');
    option.value = item.id || item.title;
    option.textContent = item.title || '';
    if (item.isPremade) {
      premadeGroup.appendChild(option);
      premadeCount += 1;
    } else {
      customGroup.appendChild(option);
      customCount += 1;
    }
  });
  if (premadeCount > 0) select.appendChild(premadeGroup);
  if (customCount > 0) select.appendChild(customGroup);
  App.updateStoryboardCard?.(selectId, key);
}

App.updateStoryboardCard = App.updateStoryboardCard || function (selectId, key) {
  const select = typeof selectId === 'string' ? document.getElementById(selectId) : selectId;
  if (!select) return;
  const card = select.closest('.storyboard-card');
  if (!card) return;
  const article = card.querySelector('.storyboard-card-right');
  if (!article) return;
  const headerEl = article.querySelector('header');
  let heading = headerEl ? headerEl.querySelector('.card-title') : null;
  const footer = article.querySelector('footer');
  let descEl = article.querySelector('.card-description');
  if (!descEl) {
    const textNode = Array.from(article.childNodes).find((n) => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
    const placeholder = textNode ? textNode.textContent.trim() : '';
    if (textNode) article.removeChild(textNode);
    descEl = document.createElement('p');
    descEl.className = 'card-description';
    descEl.textContent = placeholder;
    descEl.dataset.placeholder = placeholder;
    article.insertBefore(descEl, footer);
  }
  const small = footer ? footer.querySelector('small') : null;

  const imgWrap = card.querySelector('.storyboard-card-left');
  let img = imgWrap ? imgWrap.querySelector('.entity-image, .placeholder-image') : null;
  const item = App.getAllItems(key).find((i) => (i.id ?? i.title) === select.value);

  if (headerEl && !heading) {
    heading = document.createElement('h4');
    heading.className = 'card-title';
    heading.addEventListener('click', () => {
      select.showPicker?.() || (select.focus(), select.click());
    });
    headerEl.appendChild(heading);
  }

  const updateImage = (itemData) => {
    if (!imgWrap || typeof global.getPictureHTML !== 'function') return;
    const newImg = global.getPictureHTML(itemData, { cover: true });
    const oldUrl = img instanceof HTMLImageElement && img.src.startsWith('blob:') ? img.src : null;
    if (img) imgWrap.replaceChild(newImg, img);
    else imgWrap.appendChild(newImg);
    if (oldUrl) URL.revokeObjectURL(oldUrl);
    img = newImg;
    img.classList.toggle('empty', img.classList.contains('placeholder-image'));
  };

  if (item) {
    descEl.textContent = item.description || '';
    if (small) small.textContent = item.isPremade ? 'Premade' : '';
    if (heading) {
      heading.textContent = item.title || item.name || 'Empty';
      heading.hidden = false;
    }
    updateImage(item);
    card.dataset.entityType = key.slice(0, -1);
    card.dataset.entityId = item.id;
  } else {
    descEl.textContent = descEl.dataset.placeholder || '';
    if (small) small.textContent = '';
    select.hidden = false;
    const placeholderItem = { id: card.dataset.type || '', kind: card.dataset.type };
    updateImage(placeholderItem);
    if (heading) {
      heading.textContent = 'Empty';
      heading.hidden = false;
    }
    delete card.dataset.entityType;
    delete card.dataset.entityId;
  }
};

const titlePrompts = [
  'Once upon a time',
  'The tale of',
  'Chronicles of',
  'Legend speaks of',
  'Adventures of'
];

function randPrompt() {
  return titlePrompts[Math.floor(Math.random() * titlePrompts.length)];
}

App._defaultStoryboardTitle = function () {
  const getTitle = (id, key) => {
    const select = document.getElementById(id);
    const value = select ? select.value : '';
    if (!value) return null;
    const item = App.getAllItems(key).find((i) => (i.id ?? i.title) === value);
    return item ? item.title || null : null;
  };
  const ai = getTitle('storyboard-ai-select', 'characters');
  const user = getTitle('storyboard-user-select', 'characters');
  const world = getTitle('storyboard-world-select', 'worlds');
  const subjects = [ai, user].filter(Boolean).join(' & ');

  let title;
  if (subjects && world) {
    title = `${randPrompt()} ${subjects} in ${world}`;
  } else if (subjects) {
    title = `${randPrompt()} ${subjects}`;
  } else if (world) {
    title = `${randPrompt()} a story in ${world}`;
  } else {
    title = 'Your story begins…';
  }

  return title.length > 80 ? `${title.slice(0, 77)}…` : title;
};

App.setDynamicTitle = function () {
  const titleEl = document.getElementById('storyboard-dynamic-title');
  if (!titleEl || titleEl.dataset.manual === 'true') return;

  titleEl.textContent = App._defaultStoryboardTitle();
};

App._setupStoryboardTitle = function () {
  const titleEl = document.getElementById('storyboard-dynamic-title');
  if (!titleEl) return;
  if (titleEl.dataset.editable) return;
  titleEl.dataset.editable = 'true';
  titleEl.autocapitalize = 'off';
  titleEl.autocorrect = 'off';
  titleEl.spellcheck = false;
  titleEl.setAttribute('autocomplete', 'off');
  titleEl.setAttribute('autocapitalize', 'off');
  titleEl.setAttribute('autocorrect', 'off');
  titleEl.setAttribute('spellcheck', 'false');

  const finishEditing = () => {
    titleEl.contentEditable = 'false';
    App._editingStoryboardTitle = false;
  };

  titleEl.addEventListener('click', () => {
    if (App._editingStoryboardTitle) return;
    App._editingStoryboardTitle = true;
    titleEl.contentEditable = 'true';
    titleEl.dataset.manual = 'true';
    const sel = global.getSelection();
    if (sel) {
      const range = document.createRange();
      range.selectNodeContents(titleEl);
      sel.removeAllRanges();
      sel.addRange(range);
    }
    titleEl.focus();
  });

  titleEl.addEventListener('blur', finishEditing);
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      titleEl.blur();
    }
  });
};

App._attachStoryboardListeners = App._attachStoryboardListeners || function () {
  const configs = [
    { id: 'storyboard-ai-select', key: 'characters' },
    { id: 'storyboard-user-select', key: 'characters' },
    { id: 'storyboard-world-select', key: 'worlds' }
  ];
  configs.forEach(({ id, key }) => {
    const select = document.getElementById(id);
    if (select) {
      const handler = () => {
        App.updateStoryboardCard(id, key);
        App.setDynamicTitle();
      };
      select.addEventListener('change', handler);
      App.updateStoryboardCard(id, key);
    }
  });
  App._setupStoryboardTitle();
  const title = document.getElementById('storyboard-dynamic-title');
  if (title) {
    title.addEventListener('dblclick', () => {
      if (title.dataset.manual === 'true') {
        title.dataset.manual = '';
      }
    });
  }
  const shuffleBtn = document.getElementById('shuffle-btn');
  if (shuffleBtn) {
    shuffleBtn.addEventListener('click', () => {
      document.querySelectorAll('select.storyboard-card-title').forEach((select) => {
        const opts = select.querySelectorAll('option:not([value=""])');
        if (opts.length > 0) {
          const idx = Math.floor(Math.random() * opts.length);
          select.selectedIndex = idx + 1;
          select.dispatchEvent(new Event('change'));
        }
      });
    });
  }
};

  } = ui;

  if (deleteAllDataButton) {
    deleteAllDataButton.addEventListener('click', () => {
      if (typeof App.deleteAllData === 'function') App.deleteAllData();
    });
  }

  App._optionsListenersAttached = true;
};

App._attachContentChinActions = function () {
  if (App._contentListenersAttached) return;
  const ui = App._getUIElements();

  const configs = [
    {
      key: 'stories',
      newButton: ui.newStoryButton,
      uploadTrigger: ui.uploadStoryTrigger,
      uploadInput: ui.uploadStoryInput
    },
    {
      key: 'characters',
      newButton: ui.newCharacterButton,
      uploadTrigger: ui.uploadCharacterTrigger,
      uploadInput: ui.uploadCharacterInput
    },
    {
      key: 'worlds',
      newButton: ui.newWorldButton,
      uploadTrigger: ui.uploadWorldTrigger,
      uploadInput: ui.uploadWorldInput
    }
  ];

  configs.forEach(({ key, newButton, uploadTrigger, uploadInput }) => {
    if (newButton) {
      newButton.addEventListener('click', () => {
        if (key === 'stories') {
          App.resetStoryboard?.();
          App.router?.navigate('#storyboard');
          return;
        }
        if (key === 'characters' || key === 'worlds') {
          App.router?.navigate(`#form/${key.slice(0, -1)}/new`);
        }
      });
    }

    if (uploadTrigger && uploadInput) {
      uploadTrigger.addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) return;
            const current = loadStoredItems(key);
            global.localStorage.setItem(key, JSON.stringify(current.concat(data)));
            App.refreshAllLists();
          } catch (err) {
            console.error('Failed to import', err);
          }
          uploadInput.value = null;
        };
        reader.readAsText(file);
      });
    }
  });

  App._contentListenersAttached = true;
};

/**
 * Attaches event listeners for top bar interactions.
 * Guards against attaching duplicate listeners across multiple invocations.
 */
App._attachTopBarEventListeners = function () {
  const ui = App._getUIElements();
  if (!ui) return;

  if (ui.topBarButtons) {
    const buttons = Array.from(ui.topBarButtons);
    buttons.forEach((btn, idx) => {
      if (!App._attachedTopBarButtons.has(btn)) {
        btn.addEventListener('click', () => {
          App.selectTopBarTab(btn);
          App.ui.showChin(btn.dataset.chin);
        });
        btn.addEventListener('keydown', (e) => {
          if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
          const dir = e.key === 'ArrowRight' ? 1 : -1;
          const next = (idx + dir + buttons.length) % buttons.length;
          buttons[next].focus();
        });
        App._attachedTopBarButtons.add(btn);
      }
    });
  }

  App._attachOptionChinActions();
  App._attachContentChinActions();
  App._attachCardNavigation();

  if (!App._outsideChinListenerAttached) {
    document.addEventListener('click', (e) => {
      const current = App.ui || App._getUIElements();
      if (!current.chinContainer || current.chinContainer.hasAttribute('hidden')) return;
      if (current.chinContainer.contains(e.target) || current.topBarLeft.contains(e.target)) return;
      e.preventDefault();
      App._closeChin();
    });
    App._outsideChinListenerAttached = true;
  }
};

App.initializeWhenReadyRetryCount = App.initializeWhenReadyRetryCount || 0;

/**
 * Initializes the application once dependencies and DOM are ready.
 * Sets default database name, collects UI elements, and runs initial load.
 */
App.initializeWhenReady = async function () {
  if (typeof global.dbName === 'undefined') {
    global.dbName = 'rpglitch-db';
  }

  try {
    App._getUIElements();
    App.ui.setupChinListeners();
    App._attachChinSearchHandlers();
    if (typeof App.initialLoad === 'function') {
      await App.initialLoad();
    }
    App.refreshAllLists?.();
    App._attachStoryboardListeners?.();
    App.updateStoryboardTitle?.();
    App.initializeWhenReadyRetryCount = 0;
  } catch (error) {
    App.initializeWhenReadyRetryCount += 1;
    console.error("Failed to initialize App:", error);
  }
};

App.importAllData = function (file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      DATA_KEYS.forEach((key) => {
        if (Array.isArray(data[key])) {
          global.localStorage.setItem(key, JSON.stringify(data[key]));
        }
      });
      App.refreshAllLists();
    } catch (err) {
      console.error('Failed to import backup', err);
    } finally {
      const ui = App._getUIElements();
      if (ui.uploadBackupInput) ui.uploadBackupInput.value = null;
    }
  };
  reader.readAsText(file);
};

App.exportAllData = function () {
  const data = {};
  DATA_KEYS.forEach((key) => {
    try {
      const value = global.localStorage.getItem(key);
      data[key] = value ? JSON.parse(value) : [];
    } catch {
      data[key] = [];
    }
  });
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rpglitch-backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

App.deleteAllData = function () {
  DATA_KEYS.forEach((key) => {
    global.localStorage.removeItem(key);
  });
  App.refreshAllLists();
};

})(window, document);


    if (typeof App !== "undefined" && typeof App.initializeWhenReady === "function") {
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function(){ App.initializeWhenReady(); }, { once: true });
      } else {
        App.initializeWhenReady();
      }
    }
  } catch (err) {
    console.error("App bootstrap failed:", err);
  }
})();
</script>
