# RPGlitch Policy Engine Configuration
# Schema: Official Gemini CLI Policy Engine (docs/core/policy-engine.md)

# ============================================================================
# LOW RISK - AUTO-ALLOW (Priority 100-199)
# ============================================================================

[[rule]]
toolName = "run_shell_command"
# Routine Administrative Ops (Non-destructive)
commandPrefix = [
    "git status", "git diff", "git log", "git branch", "git add",
    "npm run lint", "npm run hygiene", 
    "ls", "dir", "ls -R", "cat", "type", "head", "tail"
]
decision = "allow"
priority = 100

[[rule]]
toolName = ["run_command", "run_shell_command"]
# Structural Hygiene (Moving/Creating files inside Pillar territories)
commandRegex = "(New-Item|Move-Item|mkdir).*(\\.agent/skills/|\\.agent/knowledge/)"
decision = "allow"
priority = 150

[[rule]]
toolName = "view_file"
decision = "allow"
priority = 100

[[rule]]
toolName = ["view_file_outline", "grep_search", "find_by_name"]
decision = "allow"
priority = 100

# ============================================================================
# MEDIUM RISK - ALLOW WITH SCOPE (Priority 200-299)
# ============================================================================

[[rule]]
toolName = ["write_to_file", "replace_file_content", "multi_replace_file_content"]
argsPattern = '"TargetFile":"[^"]*src/'
decision = "allow"
priority = 200

[[rule]]
toolName = ["write_to_file", "replace_file_content", "multi_replace_file_content"]
argsPattern = '"TargetFile":"[^"]*\\.agent/'
decision = "allow"
priority = 200

# ============================================================================
# HIGH RISK - DENY (Priority 300-399)
# ============================================================================

[[rule]]
toolName = "run_shell_command"
commandRegex = "(rm -rf|del /q|Format-Volume|rmdir /s)"
decision = "deny"
priority = 300

[[rule]]
toolName = ["write_to_file", "replace_file_content"]
argsPattern = '"TargetFile":"[^"]*\\.agent/rules/[0-9]{2}-'
decision = "deny"
priority = 350

[[rule]]
toolName = ["write_to_file", "replace_file_content"]
argsPattern = "(AI_KEY|API_SECRET|sk_live|-----BEGIN RSA PRIVATE KEY-----)"
decision = "deny"
priority = 400

# ============================================================================
# DEFAULT - ASK USER (Priority 0-99)
# ============================================================================

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npm"
decision = "ask_user"
priority = 50

[[rule]]
toolName = ["write_to_file", "replace_file_content", "multi_replace_file_content"]
decision = "ask_user"
priority = 10
