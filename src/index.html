<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // CRITICAL: Required for Perchance cross-origin iframe communication
      try {
        document.domain = "perchance.org";
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RPGlitch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Satisfy&family=Ubuntu:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a href="#svelte-root" class="skip-link">Skip to main content</a>
    <div id="svelte-root"></div>

    <!--PERCHANCE_CONFIG_TARGET-->

    <!-- Plugins exported from Left Panel directly -->
    <script data-no-vault>
      // Initialize Plugin Aliases with strict hygiene by polling for lexical variables
      // since Perchance plugins might load asynchronously and not attach to window.
      (function () {
        const MAX_POLLS = 100;
        let polls = 0;

        function capturePlugins() {
          let allFound = true;

          if (typeof window.ai === "undefined") {
            try {
              if (typeof ai !== "undefined") {
                window.ai = ai;
                window.pluginAi = ai;
              } else {
                allFound = false;
              }
            } catch (e) {
              allFound = false;
            }
          }
          if (typeof window.textToImage === "undefined") {
            try {
              if (typeof textToImage !== "undefined") {
                window.textToImage = textToImage;
                window.pluginTextToImage = textToImage;
              } else if (typeof t2i !== "undefined") {
                window.textToImage = t2i;
                window.pluginTextToImage = t2i;
              } else {
                allFound = false;
              }
            } catch (e) {
              allFound = false;
            }
          }
          if (typeof window.superFetch === "undefined") {
            try {
              if (typeof superFetch !== "undefined") {
                window.superFetch = superFetch;
                window.pluginSuperFetch = superFetch;
              } else {
                allFound = false;
              }
            } catch (e) {
              allFound = false;
            }
          }
          if (typeof window.remember === "undefined") {
            try {
              if (typeof remember !== "undefined") {
                window.remember = remember;
                window.pluginRemember = remember;
              } else {
                allFound = false;
              }
            } catch (e) {
              allFound = false;
            }
          }

          if (!allFound && polls < MAX_POLLS) {
            polls++;
            setTimeout(capturePlugins, 50);
          }
        }
        capturePlugins();
      })();
    </script>

    <style>
      /* Reserved for critical dynamic overrides */
    </style>

    <script type="module" src="/main.js"></script>
  </body>
</html>
