<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RPGlitch SOTA</title>

    <script src="../libs/dexie.min.js"></script>
    <script src="../libs/purify.min.js"></script>

    <link rel="stylesheet" href="../scss/index.scss" />
  </head>

  <body class="storyboard">
    <!-- CORE ROOT -->
    <div id="svelte-root"></div>

    <!-- ACCESSIBILITY BYPASS -->
    <a href="#svelte-root" class="skip-link">Skip to main content</a>

    <!-- BACKGROUND -->
    <div id="fractal-background" hidden></div>

    <!-- DIALOGS & OVERLAYS -->
    <dialog id="emergency-modal">
      <article>
        <header>
          <button
            type="button"
            class="close"
            aria-label="Close"
            onclick="this.closest('dialog').close()"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
              />
            </svg>
          </button>
          Error
        </header>
        <p>An error occurred during loading.</p>
        <footer>
          <button
            id="emergency-export"
            class="secondary"
            data-action="export-all"
          >
            Save All Data
          </button>
          <button
            id="emergency-delete"
            class="contrast"
            data-action="delete-all"
          >
            Delete All Data
          </button>
        </footer>
      </article>
    </dialog>

    <div id="profile-screen" hidden></div>

    <div id="entity-drawer" class="entity-drawer" aria-hidden="true" hidden>
      <div class="drawer-handle"></div>
      <header class="drawer-header">
        <h3 id="entity-drawer-title">Select Item</h3>
      </header>
      <div id="entity-drawer-content" class="drawer-content"></div>
    </div>
    <div
      id="entity-drawer-backdrop"
      class="drawer-backdrop"
      aria-hidden="true"
      hidden
    ></div>

    <!-- LEGACY PROFILE TEMPLATE DELETED -->

    <div id="global-templates" hidden aria-hidden="true">
      <template id="tpl-placeholder-icon-character"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-3.33 0-8 1.67-8 5v3h16v-3c0-3.33-4.67-5-8-5z"
          /></svg
      ></template>
      <template id="tpl-placeholder-icon-fractal"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M12 2L5 11L12 22L19 11Z" />
        </svg>
      </template>
      <template id="tpl-placeholder-icon-messenger"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V6c0-1.1-.9-2-2-2z"
            transform="translate(2, 2) scale(0.83)"
          />
        </svg>
      </template>
      <template id="tpl-placeholder-icon-default"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <rect x="4" y="4" width="16" height="16" rx="2" /></svg
      ></template>

      <template id="tpl-empty-library">
        <div class="drawer-empty">
          <svg class="empty-icon" viewBox="0 0 24 24">
            <path
              d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"
            />
          </svg>
          <h4>Your Library is Empty</h4>
          <p>Stories you start will appear here.</p>
        </div>
      </template>

      <template id="tpl-loading-library">
        <div class="drawer-empty" aria-busy="true">
          <p class="muted">Loading library...</p>
        </div>
      </template>

      <template id="tpl-typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </template>
    </div>

    <script>
      if (typeof ai !== "undefined") {
        window.ai = ai;
        window.pluginAi = ai;
      }
      if (typeof textToImage !== "undefined") {
        window.textToImage = textToImage;
        window.pluginTextToImage = textToImage;
      }
      if (typeof superFetch !== "undefined") {
        window.superFetch = superFetch;
        window.pluginSuperFetch = superFetch;
      }
      if (typeof remember !== "undefined") {
        window.remember = remember;
        window.pluginRemember = remember;
      }
      if (typeof upload !== "undefined") {
        window.upload = upload;
        window.pluginUpload = upload;
      }
    </script>

    <div id="dev-hud" style="display: none"></div>

    <!-- SCRIPTS REMOVED: Bundled via bootstrap.js -->
    <!-- GLOBAL STYLES FOR DYNAMIC ELEMENTS -->
    <style>
      /* Reserved for critical dynamic overrides */
    </style>

    <!-- CONFIRMATION MODAL -->
    <template id="tpl-confirm-modal">
      <article class="modal-content modal-content--dialog">
        <header>
          <h3 id="confirm-title">Confirm</h3>
        </header>
        <div class="modal-body">
          <p id="confirm-message">Are you sure?</p>
        </div>
        <footer>
          <button
            id="btn-confirm-cancel"
            class="btn-ghost btn-icon-raise"
            aria-label="Cancel"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
              />
            </svg>
          </button>
          <button
            id="btn-confirm-ok"
            class="btn-primary btn-icon-raise"
            aria-label="Confirm"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
          </button>
        </footer>
      </article>
    </template>

    <!-- ALERT MODAL -->
    <template id="tpl-alert-modal">
      <article class="modal-content modal-content--dialog">
        <header>
          <h3 id="alert-title">Alert</h3>
        </header>
        <div class="modal-body">
          <p id="alert-message">Notice</p>
        </div>
        <footer>
          <button
            id="btn-alert-ok"
            class="btn-primary btn-icon-raise"
            aria-label="OK"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
          </button>
        </footer>
      </article>
    </template>

    <!-- PROMPT MODAL -->
    <template id="tpl-prompt-modal">
      <article class="modal-content modal-content--dialog">
        <header>
          <h3 id="prompt-title">Prompt</h3>
        </header>
        <div class="modal-body">
          <p id="prompt-message">Enter value:</p>
          <div class="input-group">
            <input type="text" id="prompt-input" autocomplete="off" />
          </div>
        </div>
        <footer>
          <button
            id="btn-prompt-cancel"
            class="btn-ghost btn-icon-raise"
            aria-label="Cancel"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
              />
            </svg>
          </button>
          <button
            id="btn-prompt-ok"
            class="btn-primary btn-icon-raise"
            aria-label="Confirm"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
          </button>
        </footer>
      </article>
    </template>

    <!-- EPILOGUE CONTROLS (Floating Pill Design) -->
    <template id="tpl-epilogue-controls">
      <div class="epilogue-controls btn-group-pill">
        <!-- Settings -->
        <button
          id="btn-epilogue-nav-settings"
          class="btn-ghost"
          aria-label="Settings"
        >
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
            />
          </svg>
        </button>

        <!-- Delete -->
        <button
          id="btn-epilogue-nav-delete"
          class="btn-ghost"
          aria-label="Delete Story"
          title="Delete Story"
        >
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"
            />
          </svg>
        </button>

        <!-- Storyboard (Finish) -->
        <button id="btn-epilogue-nav-close" class="btn-primary">
          Storyboard
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"
            />
          </svg>
        </button>
      </div>
    </template>
  </body>
</html>
