<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RPGlitch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Satisfy&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <a href="#svelte-root" class="skip-link">Skip to main content</a>
    <div id="svelte-root"></div>

    <script src="https://perchance.org/ai-text-plugin"></script>
    <script src="https://perchance.org/text-to-image-plugin"></script>
    <script>
      // Initialize Plugin Aliases with strict hygiene
      if (typeof ai !== "undefined") {
        window.ai = ai;
        window.pluginAi = ai;
      }
      // Text-to-Image (Handle both t2i and textToImage names)
      if (typeof textToImage !== "undefined") {
        window.textToImage = textToImage;
        window.pluginTextToImage = textToImage;
      } else if (typeof t2i !== "undefined") {
        window.textToImage = t2i;
        window.pluginTextToImage = t2i;
      }
    </script>

    <style>
      /* Reserved for critical dynamic overrides */
    </style>

    <script type="module" src="/main.js"></script>
  </body>
</html>
