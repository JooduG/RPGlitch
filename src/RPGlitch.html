/* ============================================================================

:root {
  --top-bar-height: 3rem;
  --app-container-max: 100%;
  --app-container-pad: 1rem;
  --header-height: 6rem;
  --layout-left-col: 1fr;
  --layout-center-col: 2fr;
  --layout-right-col: 1fr;
  --z-base: 10;
  --z-chip: 20;
  --z-chin-container: 90;
  --z-overlay: 100;
  --z-modal: 150;
  --z-drawer: 2000;
  --z-toast: 10000;
  --pico-color: #fff;
  --pico-h1-color: #fff;
  --pico-h2-color: #fff;
  --pico-h3-color: #eee;
  --pico-primary: var(--signature-purple);
  --pico-primary-contrast: #fff;
  --pico-primary-background: var(--signature-purple);
  --pico-form-element-background-color: #3b4b5d;
  --pico-muted-color: #a0a0a0;
  --pico-muted-border-color: #555;
  --pico-del-color: #dc3545;
  --pico-radius: 0.5rem;
  --pico-box-shadow: 0;
  --pico-card-box-shadow: 0;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 5%);
  --pico-nav-element-spacing-vertical: 0;
  --pico-nav-element-spacing-horizontal: 0;
  --pico-nav-link-spacing-vertical: var(--pico-form-element-spacing-vertical);
  --pico-nav-link-spacing-horizontal: var(
    --pico-form-element-spacing-horizontal
  );
  --pico-typography-spacing-vertical: 0;
  --pico-typography-spacing-horizontal: 0;
  --pico-spacing: 0;
  --rp-text-shadow: 0 2px 4px rgb(0 0 0 / 30%);
  --color-accent: #ff7ad5;
  --signature-text-on: #fff;
  --signature-red: #ef4444;
  --signature-rose: #f43f5e;
  --signature-orange: #f97316;
  --signature-amber: #f59e0b;
  --signature-yellow: #eab308;
  --signature-lime: #84cc16;
  --signature-emerald: #10b981;
  --signature-cyan: #06b6d4;
  --signature-sky: #0ea5e9;
  --signature-indigo: #6366f1;
  --signature-violet: #8b5cf6;
  --signature-purple: #a855f7;
  --signature-pink: #ec4899;
  --signature-stone: #78716c;
  --signature-zinc: #71717a;
  --signature-default: #a855f7;
  --bg-grad-1: #181c2f;
  --bg-grad-2: #23243a;
  --bg-grad-3: #1a3a4a;
  --bg-grad-4: #2a1a3a;
}

.themed-signature {
  --current-sig: var(--signature-color, #8b5cf6);
  --current-sig-rgb: var(--signature-rgb, 139 92 246);
  --signature-10: rgb(var(--current-sig-rgb) / 10%);
  --signature-20: rgb(var(--current-sig-rgb) / 20%);
  --signature-50: rgb(var(--current-sig-rgb) / 50%);
  color: var(--current-sig);
  border-color: var(--current-sig);
}

[data-theme=dark] {
  --pico-background-color: #0f1116;
  --pico-card-background-color: #1a1d2e;
  --pico-form-element-background-color: #1a1d2e;

  --pico-h1-color: #f8fafc;
  --pico-h2-color: #f8fafc;
  --pico-h3-color: #f1f5f9;
  --pico-muted-color: #94a3b8;
  --pico-muted-border-color: #334155;
  --pico-primary-hover: #4f46e5;

/* ============================================================================
   BASE RESETS
   ============================================================================ */
* {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
*::-webkit-scrollbar {
  display: none;
}

html,
body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: var(--pico-font-family, sans-serif);
  color: var(--pico-color);
  background-image: linear-gradient(to bottom right, var(--bg-grad-1), var(--bg-grad-2) 50%, var(--bg-grad-3) 75%, var(--bg-grad-4));
  background-attachment: fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 2;
}

#fractal-background {
  position: fixed;
  inset: 0;
  z-index: 1;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  filter: blur(8px) brightness(0.3);
  transform: scale(1.1);
  pointer-events: none;
  transition: opacity 2s ease-in-out;
}

article {
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
  padding: 0 !important;
  margin: 0 !important;
}

.muted,
.placeholder-text {
  font-style: italic;
  color: var(--pico-muted-color) !important;
}

[hidden] {
  display: none !important;
}

.danger,
.danger:active,
.danger:hover {
  background: var(--pico-del-color, #dc3545);
  border-color: var(--pico-del-color, #dc3545);
  color: #fff;
}

button,
[type=button],
[type=submit] {
  cursor: pointer;
}

/* --- DEVELOPER MODE --- */
body:not(.mode-developer) .developer-content {
  display: none !important;
}

/* Helper to lock body scroll when modals are open */
body.modal-open {
  overflow: hidden;
}

/* ============================================================================
   RPGLITCH MAIN STYLESHEET
   Architecture: 7-1 Pattern (Adapted)
   ============================================================================ */
/* ============================================================================
   BASE: TYPOGRAPHY
   Headings, Text, and Icons.
   ============================================================================ */
h1,
h2,
h3,
h4 {
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-block: 0.5rem;
  color: inherit;
  text-wrap: balance;
}

p {
  line-height: 1.5;
  margin-bottom: 1rem;
  text-wrap: pretty;
}

.icon {
  width: 1.25em;
  height: 1.25em;
  vertical-align: text-bottom;
  fill: currentcolor;
  display: inline-block;
  flex-shrink: 0;
}

/* ============================================================================
   RPGLITCH MAIN STYLESHEET
   Architecture: 7-1 Pattern (Adapted)
   ============================================================================ */
/* ============================================================================
   LAYOUT: GRID SYSTEM
   The Universal Stage and main containers.
   ============================================================================ */
/* --- MAIN CONTAINER (SCROLL ROOT) --- */
main.container {
  overflow: hidden auto;
  padding: 0;
  width: 100%;
  height: 100%;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 0, 0, 0.5) transparent;
}
main.container::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
main.container::-webkit-scrollbar-track {
  background: transparent;
}
main.container::-webkit-scrollbar-thumb {
  background-color: rgba(0, 0, 0, 0.5);
  border-radius: 4px;
  border: 2px solid transparent;
  -webkit-transition: background-color 0.2s ease;
  transition: background-color 0.2s ease;
}
main.container::-webkit-scrollbar-thumb:hover {
  background-color: rgba(0, 0, 0, 0.7);
}

/* =========================================
   THE UNIVERSAL STAGE
   The master grid that persists across all app modes.
   Columns: [Left (Ai/Menu)] [Center (Stage)] [Right (User/Tools)]
   ========================================= */
.universal-stage {
  display: grid;
  grid-template-columns: 1fr 2fr 4fr 2fr 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  position: fixed;
  inset: 0;
  z-index: 100;
  opacity: 1 !important;
  transform: translateZ(0);
  --fractal-ambience-rgb: 17, 25, 31;
  background-image: radial-gradient(circle at 50% 30%, rgb(var(--fractal-ambience-rgb)/15%) 0%, transparent 70%);
  color: var(--pico-color, #fff);
  transition: all 0.6s ease;
  pointer-events: none;
}

/* --- CENTER CONTENT GRID (Storyboard) --- */
.center-layout-grid {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: var(--space-xl);
  gap: var(--space-xl);
  height: 100%;
  min-height: 100%;
  flex: 1;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  pointer-events: none;
}
.center-layout-grid #storyboard-header {
  position: fixed;
  top: 10%;
  left: 50%;
  width: 100vw;
  transform: translateX(-50%);
  text-align: center;
  z-index: 100;
  pointer-events: none;
  margin: 0;
}
.center-layout-grid .fractal-card {
  width: 100%;
  pointer-events: auto;
  flex-shrink: 0;
  flex-grow: 0;
}
.center-layout-grid .storyboard-actions {
  position: fixed;
  bottom: calc(10% + var(--space-2xl));
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  width: 100%;
  pointer-events: none;
}
@media (width <= 768px) {
  .center-layout-grid {
    padding: var(--space-md);
    gap: var(--space-md);
    justify-content: space-between;
  }
}

/* --- SIDE COLUMN ALIGNMENT (Storyboard) --- */
.stage-column--side .stage-content--storyboard {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  width: 100%;
  padding: var(--space-xl);
  pointer-events: none;
}
.stage-column--side .stage-content--storyboard > * {
  pointer-events: auto;
}
@media (width <= 768px) {
  .stage-column--side .stage-content--storyboard {
    padding: var(--space-md);
  }
}

/* --- GENERIC COLUMNS --- */
.stage-column {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  transition: all 0.6s ease;
  overflow: hidden;
  min-height: 0;
  padding: 0;
}

.stage-column--side {
  /* Anchor to 10-column tracks:
     Track 1: Margin (1fr)
     Track 2: Left Column (2fr)
     Track 4: Right Column (2fr)
     Track 5: Margin (1fr)
  */
}
.stage-column--side:first-of-type {
  grid-column: 2;
}
.stage-column--side:last-of-type {
  grid-column: 4;
}

.stage-column--center {
  grid-column: 3;
  background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
}

/* ============================================================================
   RPGLITCH MAIN STYLESHEET
   Architecture: 7-1 Pattern (Adapted)
   ============================================================================ */
/* ============================================================================
   LAYOUT: MODES & STATE
   Toggling between "Lobby" (Storyboard) and "Game" (Chat).
   ============================================================================ */
/* --- BASE VISIBILITY --- */
.stage-content--storyboard,
.stage-content--storymode {
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  width: 100%;
  height: 100%;
  position: relative;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* =========================================
   MODE: STORYBOARD (LOBBY)
   ========================================= */
body.mode-storyboard .universal-stage {
  grid-template-columns: 1fr 2fr 4fr 2fr 1fr;
}
body.mode-storyboard #stage-ai {
  grid-column: 2;
}
body.mode-storyboard #stage-center {
  grid-column: 3;
}
body.mode-storyboard #stage-user {
  grid-column: 4;
}
body.mode-storyboard .stage-content--storyboard {
  display: flex;
  flex-direction: column;
  opacity: 1;
  z-index: 10;
  padding: var(--app-container-pad, 1rem);
  pointer-events: none;
}
body.mode-storyboard .stage-content--storymode {
  display: none !important;
}

/* =========================================
   MODE: STORYMODE (ACTIVE)
   ========================================= */
body.storymode .universal-stage {
  grid-template-columns: 2fr 6fr 2fr;
}
body.storymode #stage-ai {
  grid-column: 1;
}
body.storymode #stage-center {
  grid-column: 2;
}
body.storymode #stage-user {
  grid-column: 3;
}
body.storymode .stage-content--storymode {
  display: flex;
  flex-direction: column;
  opacity: 1;
  z-index: 10;
  animation: fade-in 0.8s ease;
  pointer-events: auto;
}
body.storymode .stage-content--storyboard {
  display: none !important;
}
@media (width <= 1024px) {
  body.storymode .universal-stage {
    grid-template-columns: 1fr;
    grid-template-rows: 60px 1fr;
  }
  body.storymode .stage-column--side {
    display: none;
  }
}

/* --- ANIMATIONS --- */
@keyframes fade-in {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
/* ============================================================================
   RPGLITCH MAIN STYLESHEET
   Architecture: 7-1 Pattern (Adapted)
   ============================================================================ */
/* ============================================================================
   LAYOUT: OVERLAYS & MODALS
   Glass layers, Modal Shells, and Animations.
   ============================================================================ */
/* --- SHARED BACKDROP --- */
#profile-screen,
#settings-screen,
#settings, .modal-overlay {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: var(--z-modal);
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
  display: none;
  place-items: center;
  padding: 1rem;
  overflow: hidden;
}
.is-open#profile-screen,
.is-open#settings-screen,
.is-open#settings, .is-open.modal-overlay, .profile-view-active#profile-screen,
.profile-view-active#settings-screen,
.profile-view-active#settings, .profile-view-active.modal-overlay {
  display: grid;
  animation: fade-in-overlay 0.3s ease;
}

/* --- MODAL SHELLS --- */
.settings-layout, .profile-layout {
  width: 100%;
  background: rgba(17, 25, 31, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
  overflow: hidden;
  position: relative;
  animation: pop-in 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

.profile-layout {
  max-width: 1100px;
  height: 85vh;
  display: grid;
  grid-template-columns: 40% 60%;
}

@media (width > 768px) {
  .profile-view--fractal .profile-layout {
    grid-template-columns: 1fr;
    grid-template-rows: 200px 1fr;
  }
  .profile-view--fractal .profile-layout .profile-hero {
    height: 100%;
    max-height: 40%;
    overflow: hidden;
  }
  .profile-view--fractal .profile-layout .profile-right {
    min-height: 0;
    overflow-y: auto;
  }
}

/* --- LAYOUT B: SETTINGS (Flex) --- */
.settings-layout {
  max-width: 800px;
  height: 80vh;
  display: flex;
  flex-direction: column;
}

/* --- ANIMATIONS --- */
@keyframes pop-in {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
@keyframes fade-in-overlay {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
/* --- RESPONSIVE --- */
@media (width <= 768px) {
  #profile-screen,
  #settings-screen {
    padding: 0;
  }
  .profile-layout {
    height: 100%;
    max-height: 100vh;
    border-radius: 0;
    grid-template-columns: 1fr;
    grid-template-rows: 300px 1fr;
  }
  .settings-layout {
    height: 100%;
    max-height: 100vh;
    border-radius: 0;
    padding: 1.5rem;
  }
}
/* --- DRAWER BACKDROP --- */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(2px);
  z-index: 1999;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.drawer-backdrop[aria-hidden=false] {
  opacity: 1;
  pointer-events: auto;
}

/* ============================================================================
   RPGLITCH MAIN STYLESHEET
   Architecture: 7-1 Pattern (Adapted)
   ============================================================================ */
/* ============================================================================
   COMPONENT: CARDS & MEDIA
   Generic cards, entity slots, and previews.
   ============================================================================ */
/* --- HELPERS --- */
.picture {
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: block;
  aspect-ratio: 1/1;
  background: var(--pico-muted-border-color);
  position: relative;
}
.picture--landscape {
  aspect-ratio: 3/2;
}
.picture--portrait {
  aspect-ratio: 2/3;
}
.picture img {
  display: block;
  width: 100%;
  height: 100%;
  -o-object-fit: cover;
     object-fit: cover;
  transition: transform 0.6s ease;
}
.picture.img-flipped {
  transform: scaleX(-1);
}
.picture.img-flipped img,
.picture.img-flipped .placeholder-image {
  transform: none !important;
}

.placeholder-image {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  background: var(--pico-card-background-color, #1e293b);
  color: rgba(255, 255, 255, 0.2);
}
.placeholder-image svg {
  width: 48px;
  height: 48px;
  fill: currentcolor;
}

/* --- GENERIC CARD --- */
.card {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  background: var(--pico-card-background-color, #2b3848);
  border-radius: var(--pico-radius);
  color: var(--pico-contrast);
  padding: 0;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover, .card:has(:focus-visible) {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
}
.card:has(:focus-visible) {
  box-shadow: 0 0 0 2px var(--pico-primary-focus), 0 6px 16px rgba(0, 0, 0, 0.2);
}
.card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border: 1px solid transparent;
  height: 100%;
}
.card .card-media {
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card .card-media::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 60%, rgba(0, 0, 0, 0.6));
  opacity: 0.6;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.card .card-body {
  flex: 1;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.card:hover {
  border-color: var(--pico-muted-border-color);
}
.card:hover .card-media img {
  transform: scale(1.05);
}
.card:hover .card-media::after {
  opacity: 0.9;
}

/* --- ENTITY CARDS (Containers) --- */
.entity-card {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
  pointer-events: none;
}
.entity-card.fractal-card {
  max-width: 600px;
}
.entity-card.fractal-card .card-slot,
.entity-card.fractal-card .entity-preview.card-filled {
  aspect-ratio: 16/9;
}

/* --- EMPTY SLOT (Add New) --- */
.card-slot {
  width: 100%;
  aspect-ratio: 2/3;
  background: rgba(255, 255, 255, 0.03);
  border: 2px dashed rgba(255, 255, 255, 0.15);
  border-radius: 16px;
  display: flex;
  flex-direction: column;

/* ============================================================================
   COMPONENT: ENTITY DRAWER
   The slide-up bottom sheet for selecting/adding entities.
   ============================================================================ */
/* --- DRAWER CONTAINER --- */
.entity-drawer {
  position: fixed !important;
  inset: auto auto 0 50% !important;
  transform: translateX(-50%) translateY(100%);
  width: 80vw;
  max-height: 85vh;
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  pointer-events: none;
}
.entity-drawer.is-open {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
.entity-drawer[hidden] * {
  outline: 0;
  box-shadow: none;
}

/* --- HEADER --- */
.drawer-header {
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(0, 0, 0, 0.2);
  flex-shrink: 0;
}
.drawer-header h3 {
  margin: 0;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--pico-h3-color);
}

/* --- CONTENT GRID --- */
.drawer-content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 0, 0, 0.5) transparent;
}
.drawer-content::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
.drawer-content::-webkit-scrollbar-track {
  background: transparent;
}
.drawer-content::-webkit-scrollbar-thumb {
  background-color: rgba(0, 0, 0, 0.5);
  border-radius: 4px;
  border: 2px solid transparent;
  -webkit-transition: background-color 0.2s ease;
  transition: background-color 0.2s ease;
}
.drawer-content::-webkit-scrollbar-thumb:hover {
  background-color: rgba(0, 0, 0, 0.7);
}

.drawer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 1rem;
  padding-bottom: 2rem;
}

/* --- DRAWER ITEMS --- */
.drawer-card {
  aspect-ratio: 2/3;
  background: var(--pico-card-background-color);
  border: 1px solid transparent;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s ease;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.drawer-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
  border-color: var(--pico-primary);
}
.drawer-card .picture {
  flex: 1;
  width: 100%;
  min-height: 0;
  border-radius: 0;
}
.drawer-card > img {
  flex: 1;
  width: 100%;
  height: auto;
  min-height: 0;
  -o-object-fit: cover;
     object-fit: cover;
  display: block;
}
.drawer-card .drawer-card-label {
  position: static;
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  color: var(--signature-color, #fff);
  padding: 0.5rem;
  text-align: center;
  font-size: 0.8rem;
  font-weight: 700;
  text-shadow: none;
  flex-shrink: 0;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  white-space: normal;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.2;
}

/* --- ADD NEW --- */
.drawer-card.drawer-card--new {
  border: 2px dashed rgba(255, 255, 255, 0.2);
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--pico-muted-color);
  gap: 0.5rem;
}
.drawer-card.drawer-card--new:hover {
  border-color: var(--pico-primary);
  color: var(--pico-primary);
  background: rgba(255, 255, 255, 0.03);
}
.drawer-card.drawer-card--new .drawer-card-icon {
  font-size: 1.5rem;
}
.drawer-card.drawer-card--new .drawer-card-label {
  position: static;
  background: transparent;
  color: inherit;
  padding: 0;
  text-shadow: none;
}

/* --- EMPTY STATE --- */
.drawer-empty {
  grid-column: 1/-1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  width: 100%;
  color: var(--pico-muted-color);
  text-align: center;
  padding: 2rem;
  gap: var(--space-md);
}
.drawer-empty:not([aria-busy=true]) {
  animation: fade-in 0.3s ease-out;
}
.drawer-empty .empty-icon {
  width: 4rem;
  height: 4rem;
  opacity: 0.2;
  fill: currentcolor;
  margin-bottom: var(--space-xs);
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.drawer-empty:hover .empty-icon {
  transform: scale(1.1) rotate(-5deg);
  opacity: 0.3;
}
.drawer-empty h4 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--pico-h4-color);
}
.drawer-empty p {
  margin: 0;
  font-size: 0.9rem;
  opacity: 0.7;
}

@keyframes fade-in {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* --- UTILITIES --- */
.drawer-options-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  width: 100%;
  padding-bottom: 1rem;
}
.drawer-options-fields textarea {
  width: 100%;
  min-height: 8em;
  border-radius: var(--pico-radius);
  box-sizing: border-box;
  margin: 0;
  resize: vertical;
}

.drawer-focus-ring {
  opacity: 0;
  transition: opacity 0.15s ease;
}
body.drawer-open .drawer-focus-ring {
  opacity: 1;
}

@media (width <= 768px) {
  .storyboard-drawer {
    width: 100vw !important;
    left: 0 !important;
    transform: translateY(100%);
    border-radius: 20px 20px 0 0;
    max-height: 85vh;
  }
  .storyboard-drawer.is-open {
    transform: translateY(0);
  }
  .drawer-grid {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  }
  .drawer-options-fields {
    grid-template-columns: 1fr;
  }
}

.profile-hero .hero-wrap,

  width: 100%;

  inset: 0;

.profile-hero img {
  width: 100%;
  height: 100%;
  -o-object-fit: cover;
     object-fit: cover;
  display: block;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
}
.profile-hero img[src=""], .profile-hero img:not([src]) {

.profile-hero .img-flipped {

.profile-hero .profile-hero-overlay .loading-bar {

.profile-hero .profile-hero-overlay .loading-bar::after {
