exclude:
  - "node_modules/"
  - "build/local_libs/"
  - ".cache/"
  - "dist/"
  - ".env"
  - ".DS_Store"
  - "Thumbs.db"
  - "memory-bank/archive"
  - "memory-bank/scribbles.md"
  - "test-basic-memory/"
  - ".cursor/"
  - ".windsurf/"
  - ".amazonq/"
  - ".codex/"
  - ".gemini/"
  - ".github/"
  - ".vscode/"
runtimes:
    - java@17.0.10
    - node@22.2.0
    - python@3.11.11
tools:
    - lizard@1.17.31
    - pmd@7.16.0
    - semgrep@1.78.0
    - trivy@0.65.0
    - name: eslint
      enabled: true
      config:
        file: build/config/eslint.config.mjs
