<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RPGlitch - AI Storytelling Platform</title>

  <link rel="stylesheet" href="../../../build/local_libs/pico.min.css">
  <script src="../../../build/local_libs/dexie.js"></script>
  <script src="../../../build/local_libs/cash.min.js"></script>
  <script src="../../../build/local_libs/purify.min.js"></script>

  <link rel="stylesheet" href="../scss/index.scss">
</head>

<body class="mode-storyboard" style="overflow: hidden;">
  <a href="#main" hidden>Skip to main content</a>

  <div id="world-background"></div>

  <dialog id="loading-modal">
    <article>
      <header>
        <a href="#close" aria-label="Close" class="close"></a>Loading...
      </header>
      <p aria-busy="true">Please wait while the application loads.</p>
    </article>
  </dialog>

  <dialog id="emergency-modal">
    <article>
      <header><a href="#close" aria-label="Close" class="close"></a>Error</header>
      <p>An error occurred during loading.</p>
      <footer>
        <button id="emergency-export" class="secondary" data-action="export-all">Save All Data</button>
        <button id="emergency-delete" class="contrast" data-action="delete-all">Delete All Data</button>
      </footer>
    </article>
  </dialog>

  <div id="settings" class="modal-overlay" hidden>
    <div class="modal-content settings-layout"></div>
  </div>

  <main id="main" class="universal-stage story-grid">

    <div class="stage-column stage-column--side story-side-column" id="stage-ai">
      <div class="stage-content--storyboard">
        <article class="entity-card">
          <div id="btn-select-ai" class="card-slot" role="button" tabindex="0">
            <span class="slot-category">AI Character</span>
            <div class="slot-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z" />
              </svg>
            </div>
            <span class="slot-label">Select Archetype</span>
          </div>
          <div id="ai-character-preview" class="entity-preview" hidden></div>
        </article>
      </div>
      <div class="stage-content--gameplay character-image">
        <div class="character-portrait" id="gameplay-ai-portrait">
          <div class="portrait-image"></div>
          <div class="character-name-overlay"></div>
        </div>
      </div>
    </div>

    <div class="stage-column stage-column--center story-main-column" id="stage-center">
      <div class="stage-content--storyboard center-layout-grid">
        <div id="storyboard-header">
          <h1 id="title-storyboard" class="story-title-input">My Story</h1>
        </div>

        <article class="entity-card world-card">
          <div id="btn-select-world" class="card-slot" role="button" tabindex="0">
            <span class="slot-category">World</span>
            <div class="slot-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 010-16 8 8 0 010 16zm0-14a6 6 0 00-5.29 3h10.58A6 6 0 0012 6zm-5.29 5a6 6 0 000 2h10.58a6 6 0 000-2H6.71zm.42 3a6 6 0 005.29 3 6 6 0 005.29-3H7.13z" />
              </svg>
            </div>
            <span class="slot-label">Select Setting</span>
          </div>
          <div id="world-preview" class="entity-preview" hidden></div>
        </article>

        <div class="storyboard-actions">
          <div role="group">
            <button id="btn-shuffle" class="secondary" aria-label="Shuffle" title="Shuffle">🎲</button>
            <button id="btn-options" aria-label="Settings" title="Settings">⚙️</button>
            <button id="begin-story" class="primary" disabled>Begin Story ▶</button>
          </div>
        </div>
      </div>

      <div class="stage-content--gameplay">
        <div class="sticky-header">
          <h1 id="title-gameplay" class="story-title-input">Story Title</h1>
        </div>

        <div id="chat-feed" role="log" aria-live="polite">
          <div id="no-messages" hidden>No messages yet</div>
          <div id="typing-indicator" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        </div>

        <div id="chat-input-area">
          <div id="story-concluded" hidden>Story concluded</div>
          <div id="status-notifier" role="status" aria-live="polite" aria-atomic="true"></div>
          <form id="story-form">
            <fieldset role="group">
              <input type="text" name="message" placeholder="Type your message..." aria-label="Message"
                autocomplete="off" />

              <button type="button" id="btn-settings-placeholder" class="secondary outline" title="Settings"
                onclick="document.getElementById('settings').removeAttribute('hidden')">
                ⚙️
              </button>

              <button type="submit" disabled>Send</button>
            </fieldset>
          </form>
        </div>
      </div>
    </div>

    <div class="stage-column stage-column--side story-side-column" id="stage-user">
      <div class="stage-content--storyboard">
        <article class="entity-card">
          <div id="btn-select-user" class="card-slot" role="button" tabindex="0">
            <span class="slot-category">Your Character</span>
            <div class="slot-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-3.33 0-8 1.67-8 5v3h16v-3c0-3.33-4.67-5-8-5z" />
              </svg>
            </div>
            <span class="slot-label">Select Persona</span>
          </div>
          <div id="user-character-preview" class="entity-preview" hidden></div>
        </article>
      </div>
      <div class="stage-content--gameplay character-image" id="story-right-character">
        <div class="character-portrait" id="gameplay-user-portrait">
          <div class="portrait-image"></div>
          <div class="character-name-overlay"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="profile-screen" hidden></div>

  <div id="entity-drawer" class="entity-drawer" aria-hidden="true" hidden>
    <div class="drawer-handle"></div>
    <header class="drawer-header">
      <h3 id="entity-drawer-title">Select Item</h3>

    </header>
    <div id="entity-drawer-content" class="drawer-content"></div>
  </div>
  <div id="entity-drawer-backdrop" class="drawer-backdrop" aria-hidden="true" hidden></div>

  <template id="tpl-settings-modal">
    <header>
      <h3>Settings</h3>
      <a href="#close" aria-label="Close" class="close"
        onclick="document.getElementById('settings').setAttribute('hidden', '')"></a>
    </header>
    <div class="grid settings-shared" style="align-items: center; margin-bottom: 1rem;">
      <label style="margin-bottom: 0;">
        <input type="checkbox" id="setting-director-mode" role="switch">
        Director Mode
      </label>
      <button class="secondary outline" id="btn-reset-story" style="width: auto;">Reset All Data</button>
    </div>

    <hr>

    <div class="settings-section-game">
      <div class="campaign-controls"
        style="background: var(--card-bg-color); padding: 1rem; border-radius: var(--border-radius); border: 1px solid var(--accordion-border-color); margin-bottom: 1rem;">
        <h4
          style="margin-top:0; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-color);">
          Active Story</h4>
        <button id="btn-conclude-story" class="outline warning" style="width: 100%; margin-top: 0.5rem;">
          🏁 Conclude Story & Save State
        </button>
      </div>
    </div>

    <div class="settings-section-lobby" style="display: flex; flex-direction: column; gap: 1.5rem;">
      <label>
        Story Opening Instructions
        <textarea id="setting-story-instructions"
          placeholder="(Optional) Instructions for how the AI should start the story (e.g. 'Start in media res', 'Describe the weather first')"></textarea>
      </label>
      <label>
        Custom JavaScript
        <textarea id="setting-custom-js" placeholder="(Optional) // Custom JS code here..."></textarea>
      </label>

      <hr>

      <h4 style="font-size: 1rem; margin-bottom: 0.5rem;">Saved Stories</h4>
      <div id="saved-stories-list" class="saved-stories-list">
        <p><small>Loading stories...</small></p>
      </div>
    </div>
  </template>

  <template id="tpl-profile-page">
    <div class="profile-layout">
      <div class="profile-hero" aria-busy="false">
        <div class="hero-wrap">
          <div class="profile-hero-overlay">

            <textarea class="profile-pic-input" data-profile-field="profilePictureUrl"
              placeholder="Describe appearance or paste URL..." rows="2"></textarea>

            <!-- Row 2 & 3: 2x2 Grid Controls -->
            <div class="overlay-grid-controls">
              <!-- Item 1: Magic -->
              <button type="button" class="btn-magic-prompt" data-action="magic-prompt"
                title="Auto-Write Prompt (Director Mode)">
                ✨ Auto Write
              </button>

              <!-- Item 2: Action -->
              <button type="button" class="profile-main-action" data-action="generate">
                Generate
              </button>

              <!-- Item 3: Color -->
              <select name="signatureColour" id="signatureColour" class="signature-select" title="Signature Color">
                <!-- Options populated dynamically by ui-profile.js -->
              </select>

              <!-- Item 4: No BG -->
              <div class="chk-wrap btn-subtle-toggle" title="Remove Background (Transparent)">
                <input type="checkbox" id="gen-transparent-bg">
                <label for="gen-transparent-bg">No Background</label>
              </div>
            </div>

            <input type="file" data-profile-field="fileInput" accept="image/*" hidden="">
          </div>
        </div>
      </div>

      <div class="profile-right">
        <div class="profile-right-content">
          <form onsubmit="return false;">
            <div class="profile-header" data-profile-header=""></div>
            <div class="profile-sections" data-profile-sections=""></div>
          </form>
        </div>
      </div>
    </div>
  </template>

  <div id="global-templates" hidden aria-hidden="true">
    <template id="tpl-placeholder-icon-character"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
        fill="currentColor">
        <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-3.33 0-8 1.67-8 5v3h16v-3c0-3.33-4.67-5-8-5z" />
      </svg></template>
    <template id="tpl-placeholder-icon-world"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
        fill="currentColor">
        <path
          d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 010-16 8 8 0 010 16zm0-14a6 6 0 00-5.29 3h10.58A6 6 0 0012 6zm-5.29 5a6 6 0 000 2h10.58a6 6 0 000-2H6.71zm.42 3a6 6 0 005.29 3 6 6 0 005.29-3H7.13z" />
      </svg>
    </template>
    <template id="tpl-placeholder-icon-default"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
        fill="currentColor">
        <rect x="4" y="4" width="16" height="16" rx="2" />
      </svg></template>

    <template id="tpl-typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </template>
  </div>

  <script>
    if (typeof ai !== "undefined") { window.ai = ai; window.pluginAi = ai; }
    if (typeof textToImage !== "undefined") { window.textToImage = textToImage; window.pluginTextToImage = textToImage; }
    if (typeof superFetch !== "undefined") { window.superFetch = superFetch; window.pluginSuperFetch = superFetch; }
    if (typeof remember !== "undefined") { window.remember = remember; window.pluginRemember = remember; }
    if (typeof upload !== "undefined") { window.upload = upload; window.pluginUpload = upload; }
  </script>

  <div id="dev-hud" style="display: none;"></div>

  <script type="module" src="../js/index.js"></script>
</body>

</html>
