<!-- RPGlitch for Perchance -->
<!-- Resilience Systems -->
 <script src="dom-registry.js"></script>
<script src="error-boundary.js"></script>
  
<!-- Minimal Pico nav test: Pico CDN only, no custom CSS -->
<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2.1.1/css/pico.min.css">

<!-- Hidden H1 for accessibility/SEO -->
<h1 id="hidden-h1" class="hidden">RPGlitch</h1>

<!-- Skip Link for Accessibility -->
<a href="#main" class="hidden">Skip to main content</a>

<!-- Loading Modal - Removed 'open' attribute to fix loading bug -->
<dialog id="initial-page-loading-modal" class="initial-loading-modal" no-header>
  <div>Loading...</div>
</dialog>

<!-- Emergency Export Modal -->
<dialog id="emergency" class="emergency-container" no-header>
  <div class="emergency-content">
    <div class="emergency-warning">Error during load?</div>
    <button id="emergency-export" onclick="App.exportAllData()" class="secondary">Save All Data &#128190;</button>
    <button id="emergency-delete" onclick="App.deleteAllData()" class="secondary">Delete All Data &#128680;</button>
  </div>
</dialog>

<div class="app-scrollable-container">
  <div class="container">
    <nav id="top-bar" class="top-bar">
      <div class="top-bar-left">
        <ul>
          <li><button class="secondary" data-tab="storyboard" role="tab" aria-selected="false" tabindex="1" _="on click call App.selectTopBarTab('storyboard') then call App.updateTopBarUI()">Storyboard</button></li>
          <li><button class="secondary" data-tab="characters" role="tab" aria-selected="false" tabindex="2" _="on click call App.selectTopBarTab('characters') then call App.updateTopBarUI()">Character Workshop</button></li>
          <li><button class="secondary" data-tab="worlds" role="tab" aria-selected="false" tabindex="3" _="on click call App.selectTopBarTab('worlds') then call App.updateTopBarUI()">World Creation</button></li>
          <li><button class="secondary" data-tab="options" role="tab" aria-selected="false" tabindex="4" _="on click call App.selectTopBarTab('options')">Options</button></li>
        </ul>
      </div>
      <div id="top-bar-right" class="top-bar-right">
        <div id="top-bar-storyboard" class="hidden">
          <button class="secondary" id="shuffle-button" _="on click call App._shuffleStoryboard()">Shuffle</button>
          <button class="primary" id="begin-story-button" _="on click call App.beginStory()">Begin Story</button>
        </div>
        <div id="top-bar-form" class="hidden">
          <button class="secondary" id="cancel">Cancel</button>
          <button class="primary" id="save">Save</button>
        </div>
        <div id="top-bar-profile" class="hidden">
          <button class="secondary" id="edit">Edit</button>
          <button class="danger" id="delete">Delete</button>
          <button class="primary" id="back">Back</button>
        </div>
        <div id="top-bar-chat" class="hidden">
          <button class="primary" id="back-chat">Back</button>
        </div>
      </div>
    </nav>    
    <!-- Chin Area -->    
     <div id="chin-area">

    <!-- Chin -->
    <div id="chin-story" class="top-bar-chin hidden" data-chin="storyboard">
      <div id="chin-story-placeholder"></div>
      <div id="chin-story-list" class="chin-list-grid"></div>
    </div>

    <div id="chin-character" class="top-bar-chin hidden" data-chin="characters">
      <div id="chin-character-placeholder"></div>
      <div id="chin-character-list" class="chin-list-grid">
        <article class="chin-character-card">
          <div class="chin-card-grid">
            <div class="chin-card-left">
              <header>
                <h4 class="margin-0">Starship AI "ADA"</h4>
              </header>
              <p class="font-size-95 margin-top-05 line-height-13">The ever-helpful AI of the starship "Odyssey," tasked with crew support and mission analysis.</p>
              <footer>
                <small>Premade</small>
              </footer>
            </div>
            <div class="chin-card-right">
              <div class="chin-card-profile-picture">SA</div>
            </div>
          </div>
        </article>
      </div>
    </div>

    <div id="chin-world" class="top-bar-chin hidden" data-chin="worlds">
      <div id="chin-world-placeholder"></div>
      <div id="chin-world-list" class="chin-list-grid"></div>
    </div>

    <div id="chin-options" class="top-bar-chin hidden" data-chin="options">
      <div id="chin-options-placeholder"></div>
      <div id="chin-options-list" class="chin-options-grid">
        <div>
          <textarea id="opening-prompt" placeholder="Opening Prompt"></textarea>
        </div>
        <div>
          <textarea id="custom-js" placeholder="Custom JS"></textarea>
        </div>
      </div>
    </div>
  </div>
  <!-- Chin Area End -->
  <!-- Top Bar End -->

  <div class="container">
    <div class="main-content-container">
      <!-- CHIN AREA: Selects and Cards, always aligned with top bar -->
      <div class="container" id="storyboard-screen">
        <header id="storyboard-title-area" class="storyboard-title-padding">
          <h2 id="storyboard-title"></h2>
        </header>
        <div id="storyboard-content">
          <div id="storyboard-columns">
            <div class="storyboard-cards-row">
              <article id="storyboard-ai-character-card">
                <div id="storyboard-ai-character-select" class="card-title-dropdown"></div>
              </article>
              <article id="storyboard-user-character-card">
                <div id="storyboard-user-character-select" class="card-title-dropdown"></div>
              </article>
              <article id="storyboard-world-card">
                <div id="storyboard-world-select" class="card-title-dropdown"></div>
              </article>
            </div>
          </div>
        </div>
      </div>
      <!-- Main Area -->
      <div id="main" role="main" tabindex="-1">
        <!-- Character Workshop Screen -->
        <div id="character-workshop-screen" class="screen hidden">
          <div id="character-workshop-content">
            <div id="character-workshop-list"></div>
          </div>
        </div>

        <!-- World Builder Screen -->
        <div id="world-builder-screen" class="screen hidden">
          <div id="world-builder-content">
            <div id="world-builder-list"></div>
          </div>
        </div>

        <!-- Character Form Screen -->
        <div id="character-form-screen" class="screen hidden">
          <div id="character-form-content"></div>
        </div>

        <!-- World Form Screen -->
        <div id="world-form-screen" class="screen hidden">
          <div id="world-form-content"></div>
        </div>

        <!-- Character Profile Screen -->
        <div id="character-profile-screen" class="screen hidden">
          <div id="character-profile-content"></div>
        </div>

        <!-- World Profile Screen -->
        <div id="world-profile-screen" class="screen hidden">
          <div id="world-profile-content"></div>
        </div>

        <!-- Story Profile Screen -->
        <div id="story-profile-screen" class="screen hidden">
          <div id="story-profile-content"></div>
        </div>

        <!-- Chat Interface Screen -->
        <div id="chat-interface-screen" class="screen hidden">
          <div id="chat-interface-content">
            <div id="chat-message-feed"></div>
            <div id="chat-input-area">
              <textarea id="chat-input" placeholder="Type your message..."></textarea>
              <input id="message-input" placeholder="Type your message... (legacy input)">
              <button id="send-button">Send</button>
            </div>
          </div>
        </div>

        <!-- Premade Character Selection Screen -->
        <div id="premade-character-bank" class="screen hidden">
          <div id="premade-character-content">
            <div id="premade-character-only-list"></div>
          </div>
        </div>

        <!-- Premade World Selection Screen -->
        <div id="premade-world-bank" class="screen hidden">
          <div id="premade-world-content">
            <div id="premade-world-only-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Profile Picture Component -->
<div id="profile-picture-overlay" class="profile-picture-overlay hidden">
  <div class="profile-picture-modal">
    <div class="profile-picture-header">
      <h3>Profile Picture</h3>
      <button id="close-profile-picture" class="close-button">&times;</button>
    </div>
    <div class="profile-picture-content">
      <div class="profile-picture-preview">
        <div id="profile-picture-preview-area"></div>
      </div>
      <div class="profile-picture-controls">
        <textarea id="profile-picture-prompt" placeholder="Describe the profile picture..."></textarea>
        <div class="profile-picture-buttons">
          <button id="generate-profile-picture">Generate</button>
          <button id="use-url-profile-picture">Use URL</button>
          <button id="ai-help-profile-picture">AI Help</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
<script src="https://unpkg.com/cash-dom"></script>
<script src="ProfilePictureComponent.js"></script>
<script src="RPGlitch.js"></script>
