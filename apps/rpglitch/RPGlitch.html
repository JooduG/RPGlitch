<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPGlitch - AI Storytelling Platform</title>
  
</head>

<body>

  <!-- Hidden for accessibility/SEO -->
  <a href="#main" hidden="hidden">Skip to main content</a>

  <!-- Initial Loading -->
  <dialog id="loading-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev"></button>
      </header>
      <span aria-busy="true"><h2>Loading...</h2></span>
    </article>
  </dialog>

  <!-- Error Emergency -->
  <dialog id="emergency-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev"></button>
      </header>
      <h2>Error during load?</h2>
      <footer>
        <button id="emergency-export" class="danger" data-action="export-all">Save All Data &#128190;</button>
        <button id="emergency-delete" class="danger" data-action="delete-all">Delete All Data &#128680;</button>
      </footer>
    </article>
  </dialog>

  <header class="container-fluid">
    
      <!-- Top Bar -->
      <nav id="top-bar" class="top-bar">

        <!-- Top Bar Left -->
        <div id="top-bar-left" class="top-bar-left">
          <ul role="tablist">
            <li><button class="secondary top-bar-tab chin-button" role="tab" tabindex="0" id="tab-stories" aria-selected="false" aria-expanded="false" aria-controls="chin-stories" data-chin="stories">Stories</button></li>
            <li><button class="secondary top-bar-tab chin-button" role="tab" tabindex="-1" id="tab-characters" aria-selected="false" aria-expanded="false" aria-controls="chin-characters" data-chin="characters">Characters</button></li>
            <li><button class="secondary top-bar-tab chin-button" role="tab" tabindex="-1" id="tab-worlds" aria-selected="false" aria-expanded="false" aria-controls="chin-worlds" data-chin="worlds">Worlds</button></li>
            <li><button class="secondary top-bar-tab chin-button" role="tab" tabindex="-1" id="tab-options" aria-selected="false" aria-expanded="false" aria-controls="chin-options" data-chin="options">Options</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Storyboard -->
        <div id="top-bar-right-storyboard" class="top-bar-right">
          <ul>
            <li><button class="secondary" id="shuffle">Shuffle</button></li>
            <li><button class="primary" id="begin-story">Begin Story</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Form -->
        <div id="top-bar-right-form" class="top-bar-right" hidden="hidden">
          <ul>
            <li><button class="secondary" id="form-cancel">Cancel</button></li>
            <li><button class="primary" id="form-save">Save</button></li>
          </ul>
        </div>

        <!-- Top Bar Right: Profile -->
        <div id="top-bar-right-profile" class="top-bar-right" hidden="hidden">
          <ul>
            <li><button class="secondary" id="profile-edit">Edit</button></li>
            <li><button class="secondary" id="profile-copy">Copy & Customize</button></li>
            <li><button class="danger" id="profile-delete">Delete</button></li>
            <li><button class="primary" id="profile-back">Back</button></li>
          </ul>
        </div>
      </nav>

  </header>
    <!-- Chin Container -->
  <div id="chin-container" class="chin-container hidden">
  
    <!-- Stories Chin -->
    <div role="tabpanel" tabindex="0" id="chin-stories" aria-labelledby="tab-stories" data-chin="stories" class="chin chin-panel" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-stories-input" name="search" placeholder="Search Stories" aria-label="Search Stories" />
              <button type="submit" class="secondary">Search</button>
            </fieldset>
          </form>
        </div>
  
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-story">
            Upload Story
          </button>
            <input type="file" id="upload-story" aria-label="Upload Story" class="file-input" hidden="hidden"/>
          <button id="new-story" class="secondary">New Story</button>
        </div>
      </div>
      <div id="chin-story-grid" class="chin-grid chin-list"><!-- Story Cards --></div>
    </div>
  
    <!-- Chin: Character -->
    <div role="tabpanel" tabindex="0" id="chin-characters" aria-labelledby="tab-characters" data-chin="characters" class="chin chin-panel" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-characters-input" name="search" placeholder="Search Characters" aria-label="Search Characters" />
              <button type="submit" class="secondary">Search</button>
            </fieldset>
          </form>
        </div>
  
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-character">
            Upload Character
          </button>
            <input type="file" id="upload-character" aria-label="Upload Character" hidden="hidden"/>
          <button id="new-character" class="secondary">New Character</button>
        </div>
      </div>
  
      <div id="chin-character-grid" class="chin-grid chin-list"><!-- Character Cards --></div>
    </div>
  
    <!-- Chin: World -->
    <div role="tabpanel" tabindex="0" id="chin-worlds" aria-labelledby="tab-worlds" data-chin="worlds" class="chin chin-panel" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
          <form role="search">
            <fieldset role="group">
              <input type="search" class="chin-search" id="search-worlds-input" name="search" placeholder="Search Worlds" aria-label="Search Worlds" />
              <button type="submit" class="secondary">Search</button>
            </fieldset>
          </form>
        </div>
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-world">
            Upload World
          </button>
            <input type="file" id="upload-world" aria-label="Upload World" hidden="hidden"/>
          <button id="new-world" class="secondary">New World</button>
        </div>
      </div>
      <div id="chin-world-grid" class="chin-grid chin-list"><!-- World Cards --></div>
    </div>
  
    <!-- Chin: Options -->
    <div role="tabpanel" tabindex="0" id="chin-options" aria-labelledby="tab-options" data-chin="options" class="chin chin-panel" hidden="hidden">
      <div class="chin-actions">
        <div class="chin-actions-left">
        <!-- Something in the future? -->
        </div>
        <div class="chin-actions-right">
          <button type="button" class="secondary" data-trigger="upload-backup">
            Upload All
          </button>
          <input type="file" id="upload-backup" aria-label="Upload Backup" hidden="hidden"/>
          <button id="download-backup" class="secondary">Download Backup</button>
          <button id="delete-all-data" class="danger">Delete All Data</button>
        </div>
      </div>
      <div class="chin-options-fields">
        <label for="opening-prompt">Story Prompt</label>
        <textarea id="opening-prompt" placeholder="Story Prompt"></textarea>
        <label for="custom-js">Custom JS</label>
        <textarea id="custom-js" placeholder="Custom JS"></textarea>
      </div>
    </div>
  </div>
  
  
  <!-- Main Container -->
  <main id="main" class="container-fluid">
    
    <!-- Storyboard Screen -->
    <div id="storyboard-screen">
      <div id="storyboard-title-container">
        <h2 id="storyboard-title">Storyboard</h2>
      </div>

        <div id="storyboard-grid">
            <div class="storyboard-card" id="storyboard-card-ai">
              <div class="storyboard-card-left">
                <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2Y1ZjVmNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPkFJIENoYXJhY3RlcjwvdGV4dD48L3N2Zz4=" alt="AI Character" />
              </div>
                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-ai-select" class="storyboard-select" aria-label="Choose AI Character"><option value="">Choose AI Character...</option></select>
                  </header>
                    Select an AI character for your story...
                  <footer>
                    <small>Täg</small> 
                  </footer>
                </article>
            </div>

            <div class="storyboard-card" id="storyboard-card-user">
              <div class="storyboard-card-left">
                <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2Y1ZjVmNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlVzZXIgQ2hhcmFjdGVyPC90ZXh0Pjwvc3ZnPg==" alt="User Character" />
              </div>
                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-user-select" class="storyboard-select" aria-label="Choose User Character"><option value="">Choose User Character...</option></select>
                  </header>
                    Select your character for the story...
                  <footer>
                    <small><!-- Premade Tag --></small> 
                  </footer>
                </article>
            </div>

            <div class="storyboard-card" id="storyboard-card-world">
              <div class="storyboard-card-left">
                <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2Y1ZjVmNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPldvcmxkPC90ZXh0Pjwvc3ZnPg==" alt="World" />
              </div>
                <article class="storyboard-card-right">
                  <header>
                    <select id="storyboard-world-select" class="storyboard-select" aria-label="Choose World"><option value="">Choose World...</option></select>
                  </header>
                    Select a world for your story...
                  <footer>
                    <small><!-- Premade Tag --></small> 
                  </footer>
                </article>
            </div>
          </div>
      </div>

    <!-- Chat Screen -->
    <div id="chat-screen-container" hidden="hidden" >
      <div id="chat-screen">

        <!-- Character Display Areas -->
        <div id="user-character-display"></div>
        <div id="ai-character-display"></div>
        
        <!-- Chat Wrapper -->
        <div id="chat-wrapper">
          <!-- Chat Feed -->
          <div id="chat-feed"></div>
          
          <!-- Status Elements -->
          <div id="story-concluded">Story concluded</div>
          <div id="no-messages">No messages yet</div>
          <div id="status-notifier"></div>
          <div id="typing-indicator"></div>
          <button id="conclude-story">Conclude Story</button>
        </div>
      </div>

          <!-- Input Area -->
          <footer>
            <form>
              <fieldset role="group">
                <input type="text" name="message" placeholder="Type your message..." aria-label="Message" />
                <input type="submit" value="Send" />
              </fieldset>
            </form>
          </footer>
        </div>

    <!-- Profile Screen -->
    <div id="profile-screen" hidden="hidden" >
      <!-- Profile content will be dynamically generated -->
    </div>

    <!-- Character Form Screen -->
    <div id="character-form-screen" hidden="hidden" >
      <!-- Character form content will be dynamically generated -->
    </div>

    <!-- World Form Screen -->
    <div id="world-form-screen" hidden="hidden" >
      <!-- World form content will be dynamically generated -->
    </div>

    <!-- Premade Character Bank -->
    <div id="premade-character-bank" hidden="hidden" >
      <div id="premade-character-list"></div>
    </div>

    <!-- Premade World Bank -->
    <div id="premade-world-bank" hidden="hidden" >
      <div id="premade-world-list"></div>
    </div>

    <!-- Memory Application Screen -->
    <div id="memory-application-screen" hidden="hidden" >
      <!-- Memory application content will be dynamically generated -->
    </div>

  </main>

  <script src="utils.js"></script>
  <script src="RPGlitch.js"></script>
  <script>
    document.addEventListener(
      'DOMContentLoaded',
      () => {
        App.initializeWhenReady();
      },
      { once: true }
    );
  </script>

</body>
</html>
