<!DOCTYPE html>
<html>
<head>
    <title>RPGlitch Test</title>
</head>
<body>
    <div id="top-bar">
        <div id="top-bar-left"></div>
        <div id="top-bar-right"></div>
    </div>
    <div id="chin-container"></div>
    <div id="main"></div>
    <div id="storyboard-screen"></div>
    <div id="chat-screen"></div>
    <div id="character-form-screen"></div>
    <div id="world-form-screen"></div>

    <script>
        // Mock dependencies
        window.Dexie = function() {};
        window.DOMPurify = { sanitize: function(text) { return text; } };
        window._hyperscript = {};
        window.$ = function() {};
        
        // Load the main script
    </script>
    <script src="RPGlitch.js"></script>
    <script>
        console.log('Testing App object...');
        console.log('App:', window.App);
        console.log('App._getUIElements:', typeof window.App._getUIElements);
        
        if (window.App && typeof window.App._getUIElements === 'function') {
            console.log('✅ _getUIElements is a function');
            try {
                window.App._getUIElements();
                console.log('✅ _getUIElements executed successfully');
                
                // Test initializeWhenReady
                if (typeof window.App.initializeWhenReady === 'function') {
                    console.log('✅ initializeWhenReady is a function');
                    try {
                        window.App.initializeWhenReady();
                        console.log('✅ initializeWhenReady executed successfully');
                    } catch (error) {
                        console.error('❌ Error calling initializeWhenReady:', error);
                    }
                } else {
                    console.error('❌ initializeWhenReady is not a function');
                }
            } catch (error) {
                console.error('❌ Error calling _getUIElements:', error);
            }
        } else {
            console.error('❌ _getUIElements is not a function');
        }
    </script>
</body>
</html>
