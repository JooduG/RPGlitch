<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RPGlitch - AI Storytelling Platform</title>


    <script src="../../../build/local_libs/dexie.min.js"></script>
    <script src="../../../build/local_libs/cash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
    <script src="../../../build/local_libs/purify.min.js"></script>

    <link rel="stylesheet" href="../scss/index.scss" />
  </head>

  <body class="mode-storyboard">
    <a href="#main" hidden>Skip to main content</a>

    <div id="fractal-background"></div>

    <div id="boot-skeleton">
      <div class="skeleton-column">
        <div class="skeleton-card"></div>
      </div>
      <div class="skeleton-column skeleton-main">
        <div class="skeleton-card fractal-card"></div>
      </div>
      <div class="skeleton-column">
        <div class="skeleton-card"></div>
      </div>
    </div>

    <dialog id="emergency-modal">
      <article>
        <header>
          <button type="button" class="close" aria-label="Close" onclick="this.closest('dialog').close()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
          Error
        </header>
        <p>An error occurred during loading.</p>
        <footer>
          <button
            id="emergency-export"
            class="secondary"
            data-action="export-all"
          >
            Save All Data
          </button>
          <button
            id="emergency-delete"
            class="contrast"
            data-action="delete-all"
          >
            Delete All Data
          </button>
        </footer>
      </article>
    </dialog>

    <div id="settings" class="modal-overlay" hidden>
      <div class="modal-content modal-content--wide settings-layout"></div>
    </div>

    <main id="main" class="universal-stage story-grid">
      <div
        class="stage-column stage-column--side story-side-column"
        id="stage-ai"
      >
        <div class="stage-content--storyboard">
          <article class="entity-card">
            <button
              id="btn-select-ai"
              type="button"
              class="card-slot shimmer"
            >
              <span class="slot-category">AI Character</span>
              <span class="slot-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z"
                  />
                </svg>
              </span>
            </button>
            <div id="ai-character-preview" class="entity-preview" hidden></div>
          </article>
        </div>
        <div class="stage-content--storymode character-image">
          <div class="character-portrait" id="storymode-ai-portrait">
            <div class="portrait-image"></div>
            <div class="character-name-overlay"></div>
          </div>
        </div>
      </div>

      <div
        class="stage-column stage-column--center story-main-column"
        id="stage-center"
      >
        <div class="stage-content--storyboard center-layout-grid">
          <div id="storyboard-header">
            <h1 id="title-storyboard" class="story-title-input">My Story</h1>
          </div>

          <article class="entity-card fractal-card">
            <button
              id="btn-select-fractal"
              type="button"
              class="card-slot shimmer"
            >
              <span class="slot-category">Fractal</span>
              <span class="slot-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2L5 11L12 22L19 11Z" />
                </svg>
              </span>
            </button>
            <div id="fractal-preview" class="entity-preview" hidden></div>
          </article>

          <div class="storyboard-actions">
            <div role="group" class="btn-group-pill">
              <button
                id="btn-shuffle"
                class="btn-ghost"
                aria-label="Shuffle"
                title="Shuffle"
              >
                <svg
                  class="icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"
                  />
                </svg>
              </button>
              <button id="btn-options" class="btn-ghost" aria-label="Settings" title="Settings">
                <svg
                  class="icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                  />
                </svg>
              </button>
              <button id="begin-story" class="btn-primary" disabled>
                Begin Story
                <svg
                  class="icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path d="M8 5v14l11-7z" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="stage-content--storymode">
          <div class="sticky-header">
            <h1 id="title-storymode" class="story-title-input">Story Title</h1>
          </div>

          <!-- PHONE HEADER (Hidden by default, shown in theme-smartphone) -->
          <div id="phone-header" class="phone-header" hidden>
            <div class="status-bar">
              <span class="time" id="phone-clock">--:--</span>
              <div class="status-icons">
                <svg
                  class="icon icon-signal"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M2 22h20V2z" />
                </svg>
                <svg
                  class="icon icon-wifi"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z"
                  />
                </svg>
                <svg
                  class="icon icon-battery"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"
                  />
                </svg>
              </div>
            </div>
            <div class="contact-header">
              <!-- GROUP CHAT STYLE: Two Avatars -->
              <div class="phone-avatars">
                <!-- AI (Left/Front) -->
                <div id="phone-ai-portrait" class="phone-avatar avatar-ai">
                  <div class="portrait-image"></div>
                </div>
              </div>
              <div class="contact-info">
                <h2 id="phone-contact-name">Contact Name</h2>
                <span class="contact-status">Online</span>
              </div>
              <!-- User (Right/Back) -->
              <div id="phone-user-portrait" class="phone-avatar avatar-user">
                <div class="portrait-image"></div>
              </div>
            </div>
          </div>

          <div id="chat-feed" role="log" aria-live="polite">
            <div id="no-messages" hidden>No messages yet</div>
            <div
              id="typing-indicator"
              role="status"
              aria-live="polite"
              aria-atomic="true"
              hidden
            ></div>
          </div>

          <div id="chat-input-area">
            <div id="story-concluded" hidden>Story concluded</div>
            <div
              id="status-notifier"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            ></div>
            <form id="story-form">
              <fieldset role="group">
                <!-- TEXTAREA (First) -->
                <textarea
                  name="message"
                  placeholder="Type your message..."
                  aria-label="Message"
                  rows="1"
                ></textarea>

                <!-- SETTINGS (Middle) -->
                <button
                  type="button"
                  id="btn-settings-placeholder"
                  class="secondary outline"
                  title="Settings"
                >
                  <svg
                    class="icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <path
                      d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                    />
                  </svg>
                </button>

                <!-- SEND (Last) -->
                <button type="submit" class="btn-ghost btn-icon-raise" disabled aria-label="Send">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    style="width: 1.25em; height: 1.25em"
                    class="icon"
                  >
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                  </svg>
                </button>
              </fieldset>
            </form>
          </div>
        </div>
      </div>

      <div
        class="stage-column stage-column--side story-side-column"
        id="stage-user"
      >
        <div class="stage-content--storyboard">
          <article class="entity-card">
            <button
              id="btn-select-user"
              type="button"
              class="card-slot shimmer"
            >
              <span class="slot-category">Your Character</span>
              <span class="slot-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                  />
                </svg>
              </span>
            </button>
            <div
              id="user-character-preview"
              class="entity-preview"
              hidden
            ></div>
          </article>
        </div>
        <div
          class="stage-content--storymode character-image"
          id="story-right-character"
        >
          <div class="character-portrait" id="storymode-user-portrait">
            <div class="portrait-image"></div>
            <div class="character-name-overlay"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="profile-screen" hidden></div>

    <div id="entity-drawer" class="entity-drawer" aria-hidden="true" hidden>
      <div class="drawer-handle"></div>
      <header class="drawer-header">
        <h3 id="entity-drawer-title">Select Item</h3>
      </header>
      <div id="entity-drawer-content" class="drawer-content"></div>
    </div>
    <div
      id="entity-drawer-backdrop"
      class="drawer-backdrop"
      aria-hidden="true"
      hidden
    ></div>

    <template id="tpl-settings-modal">
      <header>
        <h3>Settings</h3>
        <button type="button" class="close" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </header>
      <div class="settings-controls modal-body">
        <div class="settings-row">
          <label for="setting-developer-mode" class="settings-label">
            <input type="checkbox" id="setting-developer-mode" role="switch" />
            Developer Mode
          </label>
          <button
            id="btn-reset-story"
            class="outline contrast btn-icon-raise btn-reset-data"
          >
            <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            Reset All Data
          </button>
        </div>
      </div>
      
      <hr class="settings-divider" /> 

      <!-- ACTIVE GAME ACTIONS (Only when playing) -->
        <div class="settings-section-storymode" hidden>
          <div class="settings-panel">
            <div role="group" class="btn-group-pill">
              <button id="btn-ghostwrite" class="secondary">
                <svg
                  class="icon icon-prefix"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12c0 4.46 2.94 8.24 7 9.5v-3.08c-2.37-.5-4-2.57-4-5.01 0-3.31 2.69-6 6-6s6 2.69 6 6c0 2.45-1.63 4.51-4 5.01v3.08c4.06-1.26 7-5.04 7-9.5 0-5.52-4.48-10-10-10zm-3 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
                  />
                </svg>
                Ghostwrite
              </button>
              <button
                id="btn-conclude-story"
                class="outline warning"
                title="Conclude"
              >
                <svg
                  class="icon icon-prefix"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z" />
                </svg>
                End
              </button>
              <button
                id="btn-generate-visual-draft"
                class="secondary output"
                title="Generate Image"
              >
                <svg
                  class="icon icon-prefix"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5S18.33 12 17.5 12z"
                  />
                </svg>
                Vis
              </button>
              <button
                id="btn-request-photo"
                class="secondary output"
                title="Request Photo"
              >
                <svg
                  class="icon icon-prefix"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"
                  />
                </svg>
                Photo
              </button>
            </div>
          </div>
        </div>

        <!-- NEW GAME CONFIG (Only when in Lobby) -->
        <div class="settings-section-lobby" hidden>
          <div class="settings-panel">
            <label>
              Story Opening Instructions
              <textarea
                id="setting-story-instructions"
                placeholder="(Optional) e.g., 'Start in media res', 'Describe the weather first'"
              ></textarea>
            </label>
            <label>
              Custom JavaScript
              <textarea
                id="setting-custom-js"
                placeholder="(Optional) // Custom JS code here..."
              ></textarea>
            </label>
          </div>
        </div>

        <hr />

        <!-- LIBRARY (Always Visible) -->
        <div class="settings-section-library">
          <div
            class="library-header library-header-row"
          >
            <h4>Library</h4>

          </div>

          <div id="library-grid" class="library-grid">
            <p><small>Loading library...</small></p>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-profile-page">
      <div class="profile-layout">
        <div class="profile-hero" aria-busy="false">
          <div class="hero-wrap">
            <div class="profile-hero-overlay">
              <textarea
                class="profile-pic-input"
                data-profile-field="profilePictureUrl"
                placeholder="Describe appearance or paste URL..."
                rows="2"
              ></textarea>

              <!-- Row 2 & 3: 2x2 Grid Controls -->
              <div class="overlay-grid-controls">
                <!-- Item 1: Magic -->
                <button
                  type="button"
                  class="btn-magic-prompt secondary"
                  data-action="magic-prompt"
                  title="Auto-Write Prompt (Director Mode)"
                >
                  <svg
                    class="icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M7.5 5.6L10 7 7.5 8.4 6.1 10.9 4.7 8.4 2.2 7 4.7 5.6 6.1 3.1 7.5 5.6zm12 9.8L22 14l-2.5-1.4L18.1 10.1l-1.4 2.5L14.2 14l2.5 1.4L18.1 17.9l1.4-2.5zM22 2l-2.5 1.4L18.1 0.9 16.7 3.4 14.2 4.8l2.5 1.4L18.1 8.7l1.4-2.5L22 4.8l-2.5-1.4L22 2z"
                    />
                  </svg>
                  Auto Write
                </button>

                <!-- Item 2: Action -->
                <button
                  type="button"
                  class="profile-main-action btn-primary"
                  data-action="generate"
                >
                  Generate
                </button>

                <!-- Item 3: Color -->
                <select
                  name="signatureColour"
                  id="signatureColour"
                  class="signature-select"
                  title="Signature Color"
                >
                  <!-- Options populated dynamically by ui-profile.js -->
                </select>

                <!-- Item 4: No BG -->
                <div
                  class="chk-wrap btn-subtle-toggle"
                  title="Remove Background (Transparent)"
                >
                  <input type="checkbox" id="gen-transparent-bg" />
                  <label for="gen-transparent-bg">No Background</label>
                </div>
              </div>

              <input
                type="file"
                data-profile-field="fileInput"
                accept="image/*"
                hidden=""
              />
            </div>
          </div>
        </div>

        <div class="profile-right">
          <div class="profile-right-content">
            <form>
              <div class="profile-header" data-profile-header=""></div>
              <div class="profile-sections" data-profile-sections=""></div>
            </form>
          </div>
        </div>
      </div>
    </template>

    <div id="global-templates" hidden aria-hidden="true">
      <template id="tpl-placeholder-icon-character"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-3.33 0-8 1.67-8 5v3h16v-3c0-3.33-4.67-5-8-5z"
          /></svg
      ></template>
      <template id="tpl-placeholder-icon-fractal"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M12 2L5 11L12 22L19 11Z" />
        </svg>
      </template>
      <template id="tpl-placeholder-icon-messenger"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V6c0-1.1-.9-2-2-2z"
            transform="translate(2, 2) scale(0.83)"
          />
        </svg>
      </template>
      <template id="tpl-placeholder-icon-default"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <rect x="4" y="4" width="16" height="16" rx="2" /></svg
      ></template>

      <template id="tpl-empty-library">
        <div class="drawer-empty">
          <svg class="empty-icon" viewBox="0 0 24 24">
            <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"/>
          </svg>
          <h4>Your Library is Empty</h4>
          <p>Stories you start will appear here.</p>
        </div>
      </template>

      <template id="tpl-loading-library">
        <div class="drawer-empty" aria-busy="true">
          <p class="muted">Loading library...</p>
        </div>
      </template>
